memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  purpose: >
    Constitutional local memory for the Axis Debug subsystem.
    Supports fast reorientation, safe continuation, disciplined creativity,
    cross-folder coherence, and aggressive hygiene.

  use_contract:
    read_on_every_access: true
    audit_against_live_folder_on_every_access: true
    update_if_truth_changed: true
    run_exit_hygiene_after_each_completed_change: true
    forbid_skipping: true

  identity:
    folder_name: debug
    canonical_path: debug/
    system_role: >
      Root cause analysis engine. Converts project context into debug playbooks,
      incident templates, and tracing rules to help developers find root causes faster.
    global_dependency_reason: >
      Provides structured debugging intelligence that accelerates issue resolution
      across the platform.
    in_scope:
      - debug run analysis
      - root cause identification
      - debug playbook generation
      - incident template creation
      - tracing rules output
      - saved incidents
      - API access for debug
    out_of_scope:
      - repo indexing or search (belongs to search/)
      - governance file generation (belongs to skills/)
      - UI audit or component guidelines (belongs to frontend/)
      - SEO analysis (belongs to seo/)

  local_contract:
    must_preserve:
      - debug-playbook.md output contract
      - incident-template.md output contract
      - tracing-rules.md output contract
    may_change:
      - internal analysis algorithms
      - playbook generation strategy
    must_not_change_without_cross_folder_update:
      - incident schema consumed by other programs
    forbidden_local_patterns:
      - duplicating context graph logic from search/
      - creating parallel snapshot ingestion

  connections:
    upstream_inputs_from:
      - search/ (context graph, repo profile)
      - root snapshot_protocol
    downstream_outputs_to:
      - .ai/debug-playbook.md
      - incident-template.md
      - tracing-rules.md
      - root-cause-checklist.md
    directly_connected_subfolders:
      - search (consumes context graph)
    external_interfaces:
      - POST /v1/debug/analyze
      - POST /v1/debug/generate

  human_surface:
    touches_user_experience: true
    primary_user_types:
      - developer
      - operator
    user_visible_effects:
      - debugging speed
      - root cause accuracy
      - incident documentation quality
    trust_sensitive: true

  canonical_truth:
    canonical_entrypoints: []
    critical_files: []
    golden_paths: []
    build_required_artifacts: []
    deploy_required_artifacts: []
    contract_artifacts:
      - .ai/debug-playbook.md
      - incident-template.md
      - tracing-rules.md
      - root-cause-checklist.md

  active_state:
    status: generators_complete
    currently_true:
      - subfolder created
      - MEMORY.yaml initialized
      - begin.yaml initialized
      - continuation.yaml initialized
    known_gaps:
      - no implementation code yet
      - no analysis engine
      - no debug API
    active_blockers:
      - requires search/ context graph to be available
    next_canonical_move: >
      Define debug-playbook.md and incident-template.md output schemas

  semantic_memory:
    stable_facts:
      - Axis Debug is a first-wave program
      - category is repo_intelligence
      - promise is "Find root cause faster"
      - acquisition_role is high_value_engineering_outcome
    boundary_facts:
      - meters are debug_runs, incident_analyses
    contract_facts:
      - outputs are .ai/debug-playbook.md, incident-template.md, tracing-rules.md, root-cause-checklist.md
    naming_truth:
      - slug is "debug"
      - full name is "Axis Debug"
    schema_truth: []

  episodic_memory:
    keep_only_high_value_episodes: true
    episodes: []

  procedural_memory:
    required_sequences: []
    validation_order: []
    recurrent_failure_patterns: []
    safe_edit_patterns: []
    unsafe_edit_patterns: []

  prospective_memory:
    pending_obligations:
      - obligation: Define output schemas for debug-playbook.md and incident-template.md
        trigger_condition: when search/ context graph schema is defined
        due_when: before any debug functionality is built
        owner_scope: debug
        must_block_exit_if_unresolved: true
    expiry_checks: []

  creative_memory:
    latent_leverage_points:
      - leverage_point: debug playbooks can inform skills/ governance generation
        why_it_exists_here: debugging patterns reveal coding standards gaps
        what_it_could_unlock: automated governance rule generation from debug patterns
        smallest_boundary_safe_probe: define playbook schema with governance-linkable fields
    adjacent_possible_moves: []
    semantic_tension_map: []

  provenance_memory:
    critical_claims: []
    contradiction_register: []

  cross_folder_sync:
    if_changed_update:
      - skills/MEMORY.yaml (if debug patterns inform governance rules)
    notify_contracts: []
    drift_risk_if_unsynced:
      - debug depends on search/ context graph staying stable

  hygiene:
    delete_on_exit:
      - temp
      - scratch
      - narrative
      - duplicate
      - recreatable
      - obsolete_evidence
    keep_on_exit:
      - runtime_required
      - build_required
      - deploy_required
      - canonical_contract
      - golden_path_required

  retention_review:
    required_after_each_completed_change: true

