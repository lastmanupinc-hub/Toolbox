        impact: "Cannot perform meaningful debug analysis without repo context"
        owner: search
        unblock_strategy: "Wait for search/ context graph schema definition"
        status: open

  execution_queue:
    qualifying_candidates:
      - id: eq_debug_001
        description: "Define debug-playbook.md output schema"
        active_vertical: v1_playbook_schema
        total_roi_score: 0
        qualifies: true
        blocked: true
        execution_rank: 1
        completion_status:
          value: pending

  source_control_policy:
    commit_after_each_completed_candidate: true
    push_after_each_successful_commit: true
    commit_message_policy:
      format: "[axis-debug] <vertical> - <summary>"
