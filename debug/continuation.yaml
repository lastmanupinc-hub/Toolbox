      next_required_move: "Define debug-playbook.md output schema"

    - id: v2_analysis_engine
      name: Analysis Engine
      status: planning
      priority: P1
      user_story: >
        As a developer, I need automated analysis of my codebase issues
        to identify root causes faster.
      saturation:
        foundation: 0
        runtime: 0
        editor: 0
        export: 0
        polish: 0
      evidence: []
      blockers:
        - playbook schema must be defined first
      next_required_move: "Design analysis pipeline architecture"

  subsystem_scorecards: []

  blocker_register:
    critical_blockers:
      - blocker_id: blk_debug_001
