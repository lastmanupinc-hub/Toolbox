bugs:
  - id: bug_001
    severity: false_positive
    component: api.ts (web client)
    element: plans_page_auto_fetch
    description: "getPlans() was reported missing but actually exists at api.ts line 303"
    status: NOT_A_BUG

  - id: bug_002
    severity: medium
    component: router / server.ts
    element: get_generated_file_single
    description: "Route :file_path could not match nested paths like .ai/context-map.json"
    status: FIXED
    fix_applied: "Added :param* wildcard support to router.ts — uses (.+) regex. Updated route to :file_path*"

  - id: bug_003
    severity: low
    component: AccountPage.tsx
    element: api_key_connect_button
    description: "Connect button used document.querySelector instead of React state"
    status: FIXED
    fix_applied: "Replaced with controlled pasteKey state variable"

  - id: bug_004
    severity: low
    component: AccountPage.tsx
    element: plan_pro_cta
    description: "No tier upgrade UI existed on account page"
    status: FIXED
    fix_applied: "Added upgrade banner cards — Free→Pro ($29/mo) and Paid→Enterprise with handleUpgrade()"

  - id: bug_005
    severity: low
    component: ProgramLauncher.tsx
    element: all program cards
    description: "No client-side tier enforcement on Pro program cards"
    status: FIXED
    fix_applied: "Added tier state via getAccount(), locked prop on ProgramCard, visual lock badge + cursor:not-allowed"

  - id: bug_006
    severity: info
    component: multiple
    element: funnel endpoints
    description: "Seats/funnel API endpoints had no web UI"
    status: FIXED
    fix_applied: "Added client functions (listSeats, inviteSeat, revokeSeat, dismissUpgradePrompt, getFunnelStatus) to api.ts. Added Team Seats management section to AccountPage."

  - id: bug_007
    severity: critical
    component: api.ts / AccountPage.tsx
    element: usage stats
    description: "getUsage() returned wrong field names — server sends {programs, totals}, client expected {by_program, monthly_snapshots, project_count}"
    status: FIXED
    fix_applied: "getUsage() now maps server response to expected shape: programs→by_program, totals.runs→monthly_snapshots, programs.length→project_count"

  - id: bug_008
    severity: critical
    component: api.ts / ProgramLauncher.tsx
    element: tier gating
    description: "getAccount() returned raw server response {account:{...}} but consumer expected flat Account. All .tier reads returned undefined, bypassing tier gating."
    status: FIXED
    fix_applied: "getAccount() now unwraps: returns data.account ?? data"

  - id: bug_009
    severity: high
    component: funnel.ts
    element: revoke seat API
    description: "handleRevokeSeat had no seat ownership verification — any authenticated user could revoke any seat in the system"
    status: FIXED
    fix_applied: "Added getSeat() lookup + account_id ownership check before calling revokeSeat()"

  - id: bug_010
    severity: high
    component: App.tsx
    element: hashchange listener
    description: "handleUploadComplete set location.hash synchronously after setResult, but hashchange listener held stale closure where result=null, snapping user back to upload page"
    status: FIXED
    fix_applied: "Changed result check to use resultRef (useRef) instead of stale closure. Removed [result] dep from useEffect."

  - id: bug_011
    severity: medium
    component: App.tsx
    element: nav account button
    description: "isLoggedIn was a plain variable, not React state — nav header did not update after signup or logout"
    status: FIXED
    fix_applied: "Lifted to useState + handleAuthChange callback passed to AccountPage, called after login/logout"

  - id: bug_012
    severity: medium
    component: api.ts
    element: download export
    description: "URL.revokeObjectURL called synchronously after a.click() — browser may not have started reading blob, producing empty/corrupt ZIP in Firefox/Safari"
    status: FIXED
    fix_applied: "Deferred revocation with setTimeout(() => URL.revokeObjectURL(a.href), 60_000)"

  # ─── Round 2 Bugs (eq_036) ───

  - id: bug_013
    severity: high
    component: server.ts
    element: health endpoint
    description: "Health route registered at /health instead of /v1/health — returned 404 from API prefix"
    status: FIXED
    fix_applied: "Changed router.get('/health') to router.get('/v1/health') in server.ts"

  - id: bug_014
    severity: medium
    component: billing.ts
    element: revoke_key_button
    description: "Re-revoking an already-revoked API key returned 200 instead of 409"
    status: FIXED
    fix_applied: "Added target.revoked_at check before revoking — returns 409 'Key already revoked'"

  - id: bug_015
    severity: medium
    component: handlers.ts
    element: github_analyze
    description: "GitHub API errors flattened to generic 502 — rate limits (429) and not-found (404) lost"
    status: FIXED
    fix_applied: "Error handler now parses HTTP status from error message. Returns 429 with retry_after, 404 for not found, 502 for other errors."

  - id: bug_016
    severity: high
    component: funnel.ts
    element: accept seat API
    description: "handleAcceptSeat had no authentication — anyone could accept any seat without logging in"
    status: FIXED
    fix_applied: "Added requireAuth() + email verification (seat.email must match authenticated user's email, else 403)"

  - id: bug_017
    severity: medium
    component: UploadPage.tsx
    element: submit_upload_button
    description: "Framework detection always sent empty array — lost framework metadata for all snapshots"
    status: FIXED
    fix_applied: "Auto-detects frameworks from package.json deps (react/vue/svelte/next/vite/express/tailwind/typescript/angular) and Python imports (flask/django/fastapi)"

  - id: bug_018
    severity: medium
    component: billing.ts
    element: update programs API
    description: "handleUpdatePrograms accepted arbitrary program names with no validation"
    status: FIXED
    fix_applied: "Added ALL_PROGRAMS validation — returns 400 for any program name not in the master list"

  - id: bug_019
    severity: high
    component: funnel.ts
    element: get_funnel_metrics
    description: "Funnel metrics endpoint was publicly accessible with no authentication"
    status: FIXED
    fix_applied: "Added requireAuth() to handleGetFunnelMetrics"

  - id: bug_020
    severity: medium
    component: funnel.ts
    element: seat_invite_submit
    description: "Inviting a duplicate email leaked raw SQLite UNIQUE constraint error to the client"
    status: FIXED
    fix_applied: "Added getSeatByEmail pre-check — returns 409 'This email already has an active seat' before insert"

  - id: bug_021
    severity: critical
    component: handlers.ts
    element: create_snapshot
    description: "Tier-based file count and file size limits were defined but never enforced — any user could upload unlimited files of any size"
    status: FIXED
    fix_applied: "Added max_files_per_snapshot check (returns 413) and per-file max_file_size_bytes check (returns 413) using TIER_LIMITS"

  - id: bug_022
    severity: high
    component: billing.ts / handlers.ts
    element: resolveAuth
    description: "Invalid or revoked API keys were silently treated as anonymous — bypassed all access controls"
    status: FIXED
    fix_applied: "resolveAuth now differentiates 'no key' (anonymous=true) from 'bad key' (anonymous=false, account=null). Snapshot and GitHub handlers reject invalid keys with 401."

