REQUIRED SYSTEM EFFECTS

A. HYGIENE-FIRST SYSTEM ENTRY
The resulting system must begin local work by:
- reading current memory/control truth
- auditing live folder truth
- identifying stale or noncanonical residue
- cleaning or downgrading that residue before new memory promotion

B. MEMORY LAYER
- support a canonical MEMORY.yaml standard for subfolders
- require MEMORY.yaml to be read on folder entry
- require local audit against live folder truth on entry
- require MEMORY.yaml update when local truth changes
- require hygiene and retention review on exit

C. MEMORY CONTENT
The resulting system must support local folder memory that can preserve:
- folder identity
- local contract
- canonical truth
- active state
- cross-folder sync obligations
- hygiene and short-term file grading
- minimal creative development fields
- behavior-routing / cognitive-mode constraints

D. COGNITIVE MODE CONTROL
The system must support the idea that different folders or subsystems may allow different safe behavior modes, such as:
- discovery
- truth
- execution
- translation

You do not need to use those exact words if the existing system implies better wording.
But the implemented system must make it possible to control what kinds of agent behavior are safe in a given local area.

E. PASSENGER ROUTING
The system must support the idea that native AI tendencies are not only mitigated, but assigned to useful bounded roles.

At minimum, the implementation must make room for:
- exploratory behavior being useful in constrained discovery contexts
- divergence being useful in bounded option generation contexts
- narrative behavior being confined to translation/documentation contexts
- momentum being useful in validated execution contexts
- truth/inventory behavior being distinct from execution behavior

Do not overcomplicate this.
Just make sure the system can express and enforce it.

F. HYGIENE AND RETENTION
The system must require:
- deletion of temporary, narrative, duplicate, recreatable, and non-runtime debris after local work
- grading of short-term files after completed work
- retention only of long-term memory that is required for runtime, build, deploy, contracts, golden paths, or truly recurring maintenance/debug needs
- removal of marketing/storytelling artifacts from development memory unless required for system operation

G. CREATIVE DEVELOPMENT
The system must support small, disciplined creative fields that help the agent generate useful subsystem-specific advancement without broadening scope irresponsibly.

These should support:
- underused leverage already present in the subsystem
- adjacent possible moves enabled by current truth
- productive subsystem-specific tensions that can guide invention

Do not inflate these into a brainstorming framework.
Keep them minimal and operational.

H. GLOBAL / LOCAL COHERENCE
The final YAML implementation must make it possible for:
- global constitutional files to govern allowed behavior
- local folder memory to govern safe local work
- continuation/state files to track evolving truth
- cross-folder updates to be required when local changes affect neighboring contracts or boundaries

