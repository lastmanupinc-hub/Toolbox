shared_platform:
  shared_across_all_programs:
    - auth
    - organizations
    - workspaces
    - projects
    - snapshot_ingestion
    - framework_detection
    - repo_parser
    - context_graph
    - feature_registry
    - command_query_event_bridge
    - usage_tracking
    - billing
    - export_engine
    - audit_history
    - api_keys
    - notifications
    - design_system
    - layout_docking
    - telemetry

snapshot_protocol:
  name: axis_snapshot_protocol
  purpose: >
    Convert arbitrary repositories into structured, queryable, AI-usable
    project context that every Axis program can consume.
  accepted_inputs:
    - repo_snapshot_upload
    - github_repo_url
    - manual_file_upload
    - api_submission
    - cli_submission
  recommended_v1:
    - repo_snapshot_upload
    - github_repo_url
    - api_submission
  captures:
    - repo_tree
    - package_manifests
    - lockfiles
    - config_files
    - selected_source_files
    - readme
    - architecture_docs
    - test_samples
    - routes_map
    - dependency_map
    - framework_detection
    - user_objectives
    - preferred_ai_tools
    - requested_outputs
  manifest_schema:
    required:
      - project_name
      - project_type
      - frameworks
      - goals
      - requested_outputs
    example:
      project_name: acme-dashboard
      project_type: saas_web_app
      frameworks:
        - nextjs
        - typescript
        - tailwind
      goals:
        - improve_ai_coding_accuracy
        - standardize_debugging
      requested_outputs:
        - AGENTS.md
        - CLAUDE.md
        - .cursorrules
        - .ai/frontend-rules.md

root_output_contract:
  root_files:
    - AGENTS.md
    - CLAUDE.md
    - CURSOR.md
    - .cursorrules
  ai_directory:
    - .ai/project-profile.yaml
    - .ai/context-map.json
    - .ai/debug-playbook.md
    - .ai/frontend-rules.md
    - .ai/seo-rules.md
    - .ai/design-tokens.json
    - .ai/workflows/
    - .ai/policies/
  ownership:
    search:
      - .ai/context-map.json
      - .ai/repo-profile.yaml
      - architecture-summary.md
    debug:
      - .ai/debug-playbook.md
      - tracing-rules.md
      - incident-template.md
    skills:
      - AGENTS.md
      - CLAUDE.md
      - CURSOR.md
      - .cursorrules
      - .ai/workflows/
      - .ai/policies/
    frontend:
      - .ai/frontend-rules.md
      - component-guidelines.md
      - layout-patterns.md
    seo:
      - .ai/seo-rules.md
      - schema-recommendations.json
      - route-priority-map.md
    optimization:
      - .ai/optimization-rules.md
      - prompt-diff-report.md
    artifacts:
      - generated-component.tsx
      - dashboard-widget.tsx
    theme:
      - .ai/design-tokens.json
      - theme.css
    brand:
      - brand-guidelines.md
      - voice-and-tone.md
    marketing:
      - campaign-brief.md
      - funnel-map.md
    mcp:
      - mcp-config.json
      - connector-map.yaml
    notebook:
      - notebook-summary.md
      - source-map.json
    obsidian:
      - obsidian-skill-pack/
      - vault-rules.md
    superpowers:
      - superpower-pack.md
      - workflow-registry.json
    remotion:
      - remotion-script.ts
      - render-config.json
    canvas:
      - canvas-spec.json
      - social-pack/
    algorithmic:
      - generative-sketch.ts
      - parameter-pack.json

api_architecture:
  pattern: command_query_event
  gateway: unified
  auth: shared_api_keys
  metering: per_program
  endpoints:
    common:
      - method: POST
        path: /v1/snapshots
        purpose: Create snapshot
      - method: GET
        path: /v1/projects/:project_id/context
        purpose: Retrieve shared project context
      - method: GET
        path: /v1/projects/:project_id/generated-files
        purpose: List outputs
    bridge:
      - method: POST
        path: /v1/bridge/commands
        purpose: Submit commands
      - method: POST
        path: /v1/bridge/queries
        purpose: Run queries
      - method: GET
        path: /v1/bridge/registry
        purpose: Sync feature registry
      - method: WS
        path: /v1/bridge/events
        purpose: Subscribe to events
  request_shape:
    required:
      - project_id
      - snapshot_id
      - program
      - objective
      - output_format
  response_shape:
    returns:
      - analysis_summary
      - detected_context
      - recommendations
      - generated_files
      - warnings
      - confidence_score

billing_model:
  default:
    free:
      - limited_runs
      - preview_outputs
      - 1_active_project
    paid_program:
      type: monthly_subscription
      includes:
        - full_exports
        - api_access
        - saved_history
        - automation
        - larger_projects
    suite_bundle:
      available: true
      includes:
        - all_core_programs
        - cross_program_workflows
        - consolidated_usage
  rules:
    - each_program_has_its_own_sku
    - programs_bill_separately
    - bundle_access_does_not_remove_individual_program_skus
    - usage_is_metered_per_program

monorepo:
  apps:
    - web
    - api
    - worker
    - docs
    - cli
  packages:
    - design-system
    - auth
    - billing
    - snapshots
    - repo-parser
    - context-engine
    - feature-registry
    - bridge-client
    - generator-core
    - export-engine
    - telemetry
    - program-search
    - program-debug
    - program-skills
    - program-frontend
    - program-seo
    - program-optimization
    - program-artifacts
    - program-theme
    - program-brand
    - program-marketing
    - program-mcp
    - program-notebook
    - program-obsidian
    - program-superpowers
    - program-remotion
    - program-canvas
    - program-algorithmic

recommended_launch_order:
  wave_1:
    - Axis Search
    - Axis Debug
    - Axis Skills
    - Axis Frontend
    - Axis SEO
  wave_2:
    - Axis Optimization
    - Axis Artifacts
    - Axis Theme
    - Axis Brand
    - Axis Notebook
  wave_3:
    - Axis Marketing
    - Axis MCP
    - Axis Obsidian
    - Axis Superpowers
    - Axis Remotion
    - Axis Canvas
    - Axis Algorithmic

v1_vertical_slice:
  goal: Prove the Axis loop end to end
  flow:
    - upload_repo_snapshot
    - run_axis_search
    - generate_repo_map
    - export_.ai/context-map.json
    - upsell_into_axis_skills

source_note:
  theme_basis: >
    The visual and bridge architecture should align with the uploaded
    averionics_theme_bridge.yaml spec.
