spec_version: 1.0.0

axis:
  name: Axis
  role: umbrella_platform
  definition: >
    Axis is the umbrella platform for everything we build: a multi-program,
    AI-native development system that turns project snapshots into diagnostics,
    governed outputs, and build-integrated tooling.
  positioning:
    short: The operating system for AI-native development
    extended: >
      Axis provides shared identity, snapshot intake, project context,
      command-query-event APIs, and a unified design system across many
      separately billable programs.
  commercial_model:
    shared_platform: true
    separate_program_billing: true
    suite_access_available: true
    continuity_across_programs: true

brand_system:
  naming:
    umbrella: Axis
    convention: "Axis <Program>"
    principles:
      - short
      - technical
      - consistent
      - operator_first
  visual_direction:
    basis_file: averionics_theme_bridge.yaml
    themes:
      - midnight_command
      - precision_white
    characteristics:
      - control_room_clarity
      - premium_restraint
      - modular_surfaces
      - disciplined_cyan_orange_signaling
      - magnetic_docking
      - motion_guided_onboarding

freemium_policy:
  free:
    - limited_snapshot_runs
    - limited_project_size
    - preview_outputs
    - partial_exports
    - 1_active_project
  paid:
    - full_exports
    - api_access
    - ci_integration
    - saved_history
    - automation
    - larger_projects
    - team_features_optional
  doctrine:
    - free_gives_diagnosis
    - paid_gives_execution
    - every_program_is_purchasable_individually
    - suite_bundle_is_optional_not_required

program_catalog:
  programs:
    - slug: search
      name: Axis Search
      category: repo_intelligence
      promise: Understand the repo faster
      description: Search and map codebases, docs, prompts, and architecture context from a project snapshot.
      acquisition_role: broad_repo_surface_area
      free:
        - limited_snapshot_runs
        - basic_repo_map
        - preview_results
      paid:
        - full_repo_index
        - saved_indexes
        - cross_project_search
        - export_context_map
        - api_access
      meters:
        - indexed_files
        - search_queries
        - active_projects
      outputs:
        - .ai/context-map.json
        - .ai/repo-profile.yaml
        - architecture-summary.md
        - dependency-hotspots.md
      endpoints:
        - POST /v1/search/analyze
        - POST /v1/search/export

    - slug: debug
      name: Axis Debug
      category: repo_intelligence
      promise: Find root cause faster
      description: Turn code, logs, traces, and project context into repeatable debugging reports and playbooks.
      acquisition_role: high_value_engineering_outcome
      free:
        - limited_debug_runs
        - issue_preview
        - basic_playbook_preview
      paid:
        - full_debug_reports
        - saved_incidents
        - root_cause_playbooks
        - trace_evaluations
        - api_access
      meters:
        - debug_runs
        - incident_analyses
        - trace_evaluations
      outputs:
        - .ai/debug-playbook.md
        - incident-template.md
        - tracing-rules.md
        - root-cause-checklist.md
      endpoints:
        - POST /v1/debug/analyze
        - POST /v1/debug/generate

    - slug: skills
      name: Axis Skills
      category: governance
      promise: Generate project-specific AI governance files
      description: Generate root-level guidance, workflows, and AI control files tailored to the project.
      acquisition_role: governance_anchor
      free:
        - limited_file_previews
        - basic_skill_generation
      paid:
        - full_file_exports
        - versioned_governance
        - workflow_library
        - reusable_templates
        - api_access
      meters:
        - generated_files
        - governance_runs
        - workflow_generations
      outputs:
        - AGENTS.md
        - CLAUDE.md
        - CURSOR.md
        - .cursorrules
        - .ai/workflows/
        - .ai/policies/
      endpoints:
        - POST /v1/skills/generate
        - POST /v1/skills/export

    - slug: frontend
      name: Axis Frontend
      category: engineering_delivery
      promise: Make UI work match the project's actual standards
      description: Audit frontend structure and produce component, layout, and interface rules aligned to the repo.
      acquisition_role: design_dev_alignment
      free:
        - limited_ui_audits
        - preview_guidelines
      paid:
        - full_ui_audits
        - component_guidelines
        - screen_generation
        - design_specs
        - api_access
      meters:
        - ui_audits
        - component_reviews
        - generated_specs
      outputs:
