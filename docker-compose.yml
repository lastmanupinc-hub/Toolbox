version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axis-app
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/axis.db
    volumes:
      - axis-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  axis-data: