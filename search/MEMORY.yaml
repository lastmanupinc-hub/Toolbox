memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  purpose: >
    Constitutional local memory for the Axis Search subsystem.
    Supports fast reorientation, safe continuation, disciplined creativity,
    cross-folder coherence, and aggressive hygiene.

  use_contract:
    read_on_every_access: true
    audit_against_live_folder_on_every_access: true
    update_if_truth_changed: true
    run_exit_hygiene_after_each_completed_change: true
    forbid_skipping: true

  identity:
    folder_name: search
    canonical_path: search/
    system_role: >
      Repo intelligence engine. Converts repository snapshots into structured,
      queryable context maps, repo profiles, and architecture summaries.
    global_dependency_reason: >
      Provides the foundational context graph that all other Axis programs consume.
    in_scope:
      - repo indexing
      - file tree analysis
      - context map generation
      - repo profile compilation
      - architecture summary output
      - search query processing
      - saved indexes
      - export context map
      - API access for search
    out_of_scope:
      - debugging or root cause analysis (belongs to debug/)
      - governance file generation (belongs to skills/)
      - UI audit or component guidelines (belongs to frontend/)
      - SEO analysis (belongs to seo/)

  local_contract:
    must_preserve:
      - context-map.json output contract
      - repo-profile.yaml output contract
      - architecture-summary.md output contract
      - snapshot ingestion interface
    may_change:
      - internal indexing strategy
      - search ranking algorithm
      - caching layer
    must_not_change_without_cross_folder_update:
      - shared context graph schema consumed by other programs
      - snapshot protocol fields
    forbidden_local_patterns:
      - duplicating snapshot ingestion logic from platform root
      - creating parallel context schemas

  connections:
    upstream_inputs_from:
      - root snapshot_protocol (repo_snapshot_upload, github_repo_url, api_submission)
    downstream_outputs_to:
      - .ai/context-map.json
      - .ai/repo-profile.yaml
      - architecture-summary.md
      - dependency-hotspots.md
    directly_connected_subfolders:
      - debug (consumes context graph)
      - skills (consumes repo profile for governance generation)
      - frontend (consumes repo structure for UI audit context)
      - seo (consumes route map for SEO analysis)
    external_interfaces:
      - POST /v1/search/analyze
      - POST /v1/search/export

  human_surface:
    touches_user_experience: true
    primary_user_types:
      - developer
      - operator
    user_visible_effects:
      - repo understanding speed
      - context accuracy for downstream tools
    trust_sensitive: true

  canonical_truth:
    canonical_entrypoints: []
    critical_files: []
    golden_paths: []
    build_required_artifacts: []
    deploy_required_artifacts: []
    contract_artifacts:
      - .ai/context-map.json
      - .ai/repo-profile.yaml
      - architecture-summary.md
      - dependency-hotspots.md

  active_state:
    status: planning
    currently_true:
      - subfolder created
      - MEMORY.yaml initialized
      - begin.yaml initialized
      - continuation.yaml initialized
    known_gaps:
      - no implementation code yet
      - no indexing engine
      - no search API
    active_blockers:
      - requires platform snapshot_protocol implementation first
    next_canonical_move: >
      Define the context-map.json and repo-profile.yaml output schemas

  semantic_memory:
    stable_facts:
      - Axis Search is a first-wave program
      - category is repo_intelligence
      - promise is "Understand the repo faster"
      - acquisition_role is broad_repo_surface_area
    boundary_facts:
      - meters are indexed_files, search_queries, active_projects
    contract_facts:
      - outputs are .ai/context-map.json, .ai/repo-profile.yaml, architecture-summary.md, dependency-hotspots.md
    naming_truth:
      - slug is "search"
      - full name is "Axis Search"
    schema_truth: []

  episodic_memory:
    keep_only_high_value_episodes: true
    episodes: []

  procedural_memory:
    required_sequences: []
    validation_order: []
    recurrent_failure_patterns: []
    safe_edit_patterns: []
    unsafe_edit_patterns: []

  prospective_memory:
    pending_obligations:
      - obligation: Define output schemas for context-map.json and repo-profile.yaml
        trigger_condition: when platform snapshot_protocol is available
        due_when: before any search functionality is built
        owner_scope: search
        must_block_exit_if_unresolved: true
    expiry_checks: []

  creative_memory:
    latent_leverage_points:
      - leverage_point: context graph is consumed by all other programs
        why_it_exists_here: search is the foundational data layer
        what_it_could_unlock: unified project understanding across all tools
        smallest_boundary_safe_probe: define minimal context graph schema
    adjacent_possible_moves: []
    semantic_tension_map: []

  provenance_memory:
    critical_claims: []
    contradiction_register: []

  cross_folder_sync:
    if_changed_update:
      - debug/MEMORY.yaml (if context graph schema changes)
      - skills/MEMORY.yaml (if repo profile schema changes)
    notify_contracts: []
    drift_risk_if_unsynced:
      - all downstream programs depend on search context graph

  hygiene:
    delete_on_exit:
      - temp
      - scratch
      - narrative
      - duplicate
      - recreatable
      - obsolete_evidence
      - ad_hoc_debug_output
      - one_off_working_files
    keep_on_exit:
      - runtime_required
      - build_required
      - deploy_required
      - canonical_contract
      - golden_path_required

  retention_review:
    required_after_each_completed_change: true
