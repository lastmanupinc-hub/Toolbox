grading_scale:
  A: "Complete, tested, human-usable end-to-end"
  B: "Functional but missing polish, docs, or minor edge cases"
  C: "Core logic exists, needs integration or UX work"
  D: "Partially implemented, significant gaps"
  F: "Stub, placeholder, or not built"

# ─── 1. CODE ANALYSIS & GENERATION ──────────────────────────────

code_analysis_and_generation:

  upload_local_folder_via_web:
    description: "Drag-drop or browse a local project folder in the web UI, auto-detect frameworks, choose outputs, and receive generated files"
    grade: A
    status: complete
    human_priority: 1_critical
    access: [web_ui]
    tested: true
    notes: "UploadPage with file filtering, framework detection, project type selector, output checkboxes"

  upload_via_github_url_web:
    description: "Paste a GitHub repo URL in the web UI to fetch, analyze, and generate outputs for a public repo"
    grade: A
    status: complete
    human_priority: 1_critical
    access: [web_ui]
    tested: true
    notes: "Supports public repos. Private repos require GITHUB_TOKEN."

  analyze_local_project_via_cli:
    description: "Run 'axis analyze /path/to/project' to scan a local codebase and write generated files to disk"
    grade: A
    status: complete
    human_priority: 1_critical
    access: [cli]
    tested: true
    notes: "Respects .gitignore, writes to .ai-output/ by default, supports --program filter"

  analyze_github_repo_via_cli:
    description: "Run 'axis github <url>' to fetch and analyze a GitHub repo from the command line"
    grade: A
    status: complete
    human_priority: 1_critical
    access: [cli]
    tested: true
    notes: "Public repos work out of the box. Private repos via --token or GITHUB_TOKEN env."

  submit_snapshot_via_api:
    description: "POST /v1/snapshots with files + manifest JSON to create a snapshot and auto-generate all program outputs"
    grade: A
    status: complete
    human_priority: 2_important
    access: [rest_api]
    tested: true
    notes: "Requires API key (Bearer token). Returns full snapshot + generated files."

  retrieve_snapshot:
    description: "GET /v1/snapshots/:id to retrieve snapshot metadata and generated file list"
    grade: A
    status: complete
    human_priority: 2_important
    access: [rest_api]
    tested: true

