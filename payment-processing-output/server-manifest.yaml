# MCP Server Manifest
# Project: avery-pay-platform
# Generated: 2026-04-05T07:37:21.804Z

server:
  name: "avery-pay-platform-mcp-server"
  version: "1.0.0"
  description: "MCP server for avery-pay-platform project integration"
  protocol: "mcp"
  transport: "stdio"

  capabilities:
    tools: true
    resources: true
    prompts: true

  tools:
    - name: analyze_project
      description: Run full project analysis and return context map
      input_schema:
        type: object
        properties:
          depth:
            type: string
            enum: [quick, standard, deep]
            default: standard

    - name: search_code
      description: Search project codebase by pattern or semantic query
      input_schema:
        type: object
        required: [query]
        properties:
          query:
            type: string
          file_pattern:
            type: string

    - name: generate_files
      description: Generate output files for a specific program
      input_schema:
        type: object
        required: [program]
        properties:
          program:
            type: string
            enum: [search, debug, skills, frontend, seo, optimization, theme, brand, superpowers, marketing, notebook, obsidian, mcp, artifacts, remotion, canvas, algorithmic]

    - name: list_routes
      description: List all 15 detected routes
      input_schema:
        type: object
        properties:
          method:
            type: string
            enum: [GET, POST, PUT, DELETE, PATCH]

  resources:
    - uri: project://context-map
      name: Project Context Map
      mime_type: application/json
      description: Full project context including structure, detection, and architecture signals

    - uri: project://repo-profile
      name: Repository Profile
      mime_type: application/yaml
      description: Repository health, structure summary, and detection results

    - uri: project://architecture-summary
      name: Architecture Summary
      mime_type: text/markdown
      description: Human-readable architecture overview

  prompts:
    - name: review_code
      description: Review code following avery-pay-platform conventions
      arguments:
        - name: file_path
          type: string
          required: true

    - name: debug_issue
      description: Debug an issue using project-specific playbooks
      arguments:
        - name: error_message
          type: string
          required: true
        - name: stack_trace
          type: string

  runtime:
    language: Go
    entry: "src/index.ts"
    env:
      - name: AXIS_PROJECT_ID
        required: true
      - name: AXIS_API_URL
        default: "http://localhost:4000"

  dependencies:
    - name: @types/node
      version: "^20.10.0"
    - name: typescript
      version: "^5.3.0"
    - name: vitest
      version: "^4.1.0"
