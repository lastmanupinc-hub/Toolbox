# Automation Pipeline
# Project: avery-pay-platform
# Generated: 2026-04-05T07:37:21.805Z

pipeline:
  name: "avery-pay-platform-automation"
  ci_platform: github-actions
  package_manager: npm

  stages:

    - name: install
      description: Install dependencies
      commands:
        - npm install
      cache:
        key: dependencies
        paths: [node_modules]

    - name: lint
      description: Static analysis and linting
      depends_on: [install]
      commands:
        - npx tsc --noEmit
      fail_fast: true

    - name: test
      description: Run test suite
      depends_on: [install]
      parallel_with: [lint]
      commands:
        - npx vitest run
      coverage:
        minimum: 80
        report_format: lcov

    - name: build
      description: Build production artifacts
      depends_on: [lint, test]
      commands:
        - npm build
      artifacts:
        paths: [dist/, build/]
        retention: 30d

    - name: security_scan
      description: Dependency vulnerability audit
      depends_on: [install]
      parallel_with: [lint, test]
      commands:
        - npm audit --audit-level=high
      allow_failure: true

    - name: deploy_staging
      description: Deploy to staging environment
      depends_on: [build]
      trigger: branch:main
      environment: staging
      commands:
        - echo "Deploy to staging"
      rollback:
        automatic: true
        on_failure: revert_to_previous

    - name: deploy_production
      description: Deploy to production
      depends_on: [deploy_staging]
      trigger: manual
      environment: production
      approval_required: true
      commands:
        - echo "Deploy to production"
      rollback:
        automatic: false
        runbook: "See incident-template.md"

  notifications:
    on_failure:
      - channel: slack
        message: "Pipeline failed on {{branch}} — {{stage}}"
    on_success:
      - channel: slack
        message: "{{branch}} deployed to {{environment}}"

  schedules:
    - name: nightly_security
      cron: "0 2 * * *"
      stages: [install, security_scan]
    - name: weekly_full
      cron: "0 4 * * 1"
      stages: [install, lint, test, build]
