project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Marketing"
    category: "growth_and_content"
    boundary: >
      Growth systems engine that generates campaigns, copy systems, funnel logic, and
      growth playbooks tied to the product. Does not perform repo indexing, debugging,
      governance generation, UI auditing, or SEO route analysis.
    core_promise: "Build reusable growth systems from one project context."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: marketing
    acquisition_role: growth_expansion
    description: Generate campaigns, copy systems, funnel logic, and growth playbooks tied to the product.
    free: [limited_templates, one_campaign_preview]
    paid: [campaign_workspaces, sequence_exports, funnel_maps, team_templates, api_access]
    meters: [campaign_generations, export_sequences, playbook_runs]
    outputs: [campaign-brief.md, funnel-map.md, sequence-pack/, cro-playbook.md]
    api_endpoints: [POST /v1/marketing/generate, POST /v1/marketing/export]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [campaign_schema, growth_engine, marketing_api, funnel_system]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
