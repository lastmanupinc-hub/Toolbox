memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: marketing
    canonical_path: marketing/
    system_role: >
      Growth systems engine. Generates campaigns, copy systems, funnel logic, and
      growth playbooks tied to the product from project context.
    global_dependency_reason: "Provides reusable growth systems and campaign logic from project truth."
    in_scope: [campaign generation, copy systems, funnel mapping, growth playbooks, sequence exports, team templates, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance (skills/), UI auditing (frontend/), SEO route analysis (seo/)]
  local_contract:
    must_preserve: [campaign-brief.md output contract, funnel-map.md output contract, sequence-pack/ output contract, cro-playbook.md output contract]
    must_not_change_without_cross_folder_update: [campaign schemas if consumed by brand/]
    forbidden_local_patterns: [duplicating brand voice from brand/, duplicating SEO from seo/]
  connections:
    upstream_inputs_from: [search/ (project context), brand/ (brand rules), seo/ (discoverability data)]
    downstream_outputs_to: [campaign-brief.md, funnel-map.md, sequence-pack/, cro-playbook.md]
    directly_connected_subfolders: [brand, seo]
    external_interfaces: [POST /v1/marketing/generate, POST /v1/marketing/export]
  human_surface: {touches_user_experience: true, primary_user_types: [marketer, growth_operator], trust_sensitive: false}
  canonical_truth:
    contract_artifacts: [campaign-brief.md, funnel-map.md, sequence-pack/, cro-playbook.md]
  active_state:
    status: planning
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code]
    active_blockers: [requires search/ and brand/ context]
    next_canonical_move: "Define campaign-brief.md output schema"
  semantic_memory:
    stable_facts: [Axis Marketing is a wave-3 program, category is growth_and_content, promise is "Build reusable growth systems from one project context", acquisition_role is growth_expansion]
    contract_facts: [outputs are campaign-brief.md, funnel-map.md, sequence-pack/, cro-playbook.md]
    naming_truth: [slug is "marketing", full name is "Axis Marketing"]
  cross_folder_sync:
    if_changed_update: [brand/MEMORY.yaml if campaign schemas affect brand rules]
    drift_risk_if_unsynced: [marketing depends on brand/ voice rules]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}
