project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Remotion"
    category: "creative_generation"
    boundary: >
      Video workflow engine generating scripts, scenes, and render-ready plans for
      video output tied to product or brand context. Does not perform repo indexing,
      debugging, governance generation, UI auditing, or SEO analysis.
    core_promise: "Turn structured inputs into automated video workflows."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: remotion
    acquisition_role: media_expansion
    description: Generate scripts, scenes, and render-ready plans for video output tied to product or brand context.
    free: [short_script_generation, scene_preview]
    paid: [rendering_workflows, reusable_templates, batch_generation, branded_exports, api_access]
    meters: [script_generations, render_jobs, template_runs]
    outputs: [remotion-script.ts, scene-plan.md, render-config.json, asset-checklist.md]
    api_endpoints: [POST /v1/remotion/generate, POST /v1/remotion/export]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [script_schema, rendering_engine, remotion_api, template_system]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
