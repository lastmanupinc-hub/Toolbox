memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: remotion
    canonical_path: remotion/
    system_role: >
      Video workflow engine. Generates scripts, scenes, and render-ready plans for
      video output tied to product or brand context.
    global_dependency_reason: "Extends Axis into automated video content generation."
    in_scope: [script generation, scene planning, render configuration, asset checklists, batch generation, branded exports, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance (skills/), UI auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [remotion-script.ts output contract, scene-plan.md output contract, render-config.json output contract, asset-checklist.md output contract]
    must_not_change_without_cross_folder_update: [render schemas if consumed by canvas/]
    forbidden_local_patterns: [duplicating brand voice from brand/, duplicating design tokens from theme/]
  connections:
    upstream_inputs_from: [brand/ (brand rules), theme/ (design tokens), search/ (project context)]
    downstream_outputs_to: [remotion-script.ts, scene-plan.md, render-config.json, asset-checklist.md]
    directly_connected_subfolders: [brand, theme, canvas]
    external_interfaces: [POST /v1/remotion/generate, POST /v1/remotion/export]
  human_surface: {touches_user_experience: true, primary_user_types: [content_creator, marketer, developer], trust_sensitive: false}
  canonical_truth:
    contract_artifacts: [remotion-script.ts, scene-plan.md, render-config.json, asset-checklist.md]
  active_state:
    status: planning
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no rendering engine]
    active_blockers: [requires brand/ and theme/ context]
    next_canonical_move: "Define remotion-script.ts and render-config.json schemas"
  semantic_memory:
    stable_facts: [Axis Remotion is a wave-3 program, category is creative_generation, promise is "Turn structured inputs into automated video workflows", acquisition_role is media_expansion]
    contract_facts: [outputs are remotion-script.ts, scene-plan.md, render-config.json, asset-checklist.md]
    naming_truth: [slug is "remotion", full name is "Axis Remotion"]
  cross_folder_sync:
    if_changed_update: [canvas/MEMORY.yaml if render schemas change]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}
