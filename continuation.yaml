  source_control_policy:
    commit_after_each_completed_candidate: true
    push_after_each_successful_commit: true
    push_allowed_only_if:
      - remote_is_configured
      - branch_policy_allows
      - validation_passed
      - no_commit_guard_triggered

    commit_message_policy:
      format: >
        [project] <active_vertical> - <completed_candidate_summary>

    push_failure_policy:
      rule: >
        If push fails, record the failure in this ledger and continue only if
        local progress remains valid and no remote-sync policy forbids continued work.

    commit_failure_policy:
      rule: >
        If commit fails, stop and surface the failure as a hard blocker.

  execution_progression_policy:
    after_each_completed_candidate:
      - update_touched_scorecards
      - update_active_vertical_saturation
      - update_blockers_removed_or_introduced
      - append_evidence
      - write_commit_and_push_result
      - regenerate_qualifying_candidate_queue
      - continue_automatically_unless_stop_condition_hit

  post_session_update_rules:
    always_do:
      - update_commit_or_tag
      - update_one_sentence_summary
      - update_current_focus_vertical
      - update_subsystem_scorecards_touched_by_session
      - update_integration_flows_if_any_path_changed
      - record_new_evidence
      - record_new_blockers_or_removed_blockers
      - record_decisions_made
      - regenerate_execution_queue
    do_not_do:
      - do_not_mark_production_validated_without_real_end_to_end_proof
      - do_not_claim_external_dependency_false_if_still_required_in_practice
      - do_not_claim_target_output_trusted_without_clean_target_import_or_use
      - do_not_claim_usability_without_obvious_path_proof