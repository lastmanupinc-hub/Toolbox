connectors:
  - id: vscode
    name: VS Code
    type: ide
    protocol: mcp
    status: available
    capabilities:
      - file_editing
      - terminal_execution
      - diagnostics
      - code_actions
  - id: cursor
    name: Cursor
    type: ide
    protocol: mcp
    status: available
    capabilities:
      - file_editing
      - terminal_execution
      - ai_chat
  - id: ci_github_actions
    name: github_actions
    type: ci_cd
    protocol: webhook
    status: detected
    capabilities:
      - build_trigger
      - test_execution
      - deployment
  - id: npm_registry
    name: npm Registry
    type: package_registry
    protocol: https
    status: available
    capabilities:
      - package_publish
      - version_check
      - audit
  - id: sqlite
    name: SQLite
    type: database
    protocol: sqlite
    status: detected
    version: "^12.8.0"
    capabilities:
      - read
      - write
      - wal_mode
  - id: git
    name: Git
    type: version_control
    protocol: git
    status: available
    capabilities:
      - commit
      - branch
      - merge
      - push

