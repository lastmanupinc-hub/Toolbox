memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: artifacts
    canonical_path: artifacts/
    system_role: >
      Web artifact generator. Creates dashboards, widgets, calculators, and mini-apps
      that match the project stack and style from project snapshots.
    global_dependency_reason: "Fast drop-in component generation tied to real project context."
    in_scope: [dashboard generation, widget creation, calculator generation, mini-app scaffolding, embed snippet output, template management, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance (skills/), UI standards auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [generated-component.tsx output contract, dashboard-widget.tsx output contract, embed-snippet.ts output contract, artifact-spec.md output contract]
    may_change: [internal generation templates, component scaffolding strategy]
    must_not_change_without_cross_folder_update: [component schema if consumed by frontend/ or theme/]
    forbidden_local_patterns: [duplicating context graph from search/, duplicating design tokens from theme/]
  connections:
    upstream_inputs_from: [search/ (context map), theme/ (design tokens), frontend/ (component standards)]
    downstream_outputs_to: [generated-component.tsx, dashboard-widget.tsx, embed-snippet.ts, artifact-spec.md]
    directly_connected_subfolders: [search, theme, frontend]
    external_interfaces: [POST /v1/artifacts/generate, POST /v1/artifacts/export]
  human_surface: {touches_user_experience: true, primary_user_types: [developer, designer], trust_sensitive: false}
  canonical_truth:
    contract_artifacts: [generated-component.tsx, dashboard-widget.tsx, embed-snippet.ts, artifact-spec.md]
  active_state:
    status: generators_complete
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no generation engine]
    active_blockers: [requires search/ and theme/ context]
    next_canonical_move: "Define artifact-spec.md output schema"
  semantic_memory:
    stable_facts: [Axis Artifacts is a wave-2 program, category is engineering_delivery, promise is "Generate drop-in web artifacts for the active project", acquisition_role is fast_output_generator]
    contract_facts: [outputs are generated-component.tsx, dashboard-widget.tsx, embed-snippet.ts, artifact-spec.md]
    naming_truth: [slug is "artifacts", full name is "Axis Artifacts"]
  cross_folder_sync:
    if_changed_update: [frontend/MEMORY.yaml if component contracts change]
    drift_risk_if_unsynced: [artifacts depend on theme/ design tokens and frontend/ standards]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}

