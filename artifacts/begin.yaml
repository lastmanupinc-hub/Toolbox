project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Artifacts"
    category: "engineering_delivery"
    boundary: >
      Web artifact generator that creates dashboards, widgets, calculators, and mini-apps
      matching the project stack and style. Does not perform repo indexing, debugging,
      governance generation, UI auditing, or SEO analysis.
    core_promise: "Generate drop-in web artifacts for the active project."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: artifacts
    acquisition_role: fast_output_generator
    description: Create dashboards, widgets, calculators, and mini-apps that match the project stack and style.
    free: [preview_artifacts, limited_generations]
    paid: [export_code, save_templates, deploy_support, embed_outputs, api_access]
    meters: [generated_artifacts, exports, template_runs]
    outputs: [generated-component.tsx, dashboard-widget.tsx, embed-snippet.ts, artifact-spec.md]
    api_endpoints: [POST /v1/artifacts/generate, POST /v1/artifacts/export]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [artifact_spec_schema, generation_engine, artifacts_api, template_library]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
