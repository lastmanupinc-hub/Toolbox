memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: brand
    canonical_path: brand/
    system_role: >
      Content governance engine. Structures tone, voice, and content constraints into
      reusable system files and prompt-ready guidance from project context.
    global_dependency_reason: "Provides brand consistency rules consumed by marketing/, theme/, canvas/."
    in_scope: [brand profile creation, tone and voice rules, content constraints, channel-specific rulesets, messaging systems, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance code files (skills/), UI auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [brand-guidelines.md output contract, voice-and-tone.md output contract, content-constraints.md output contract, messaging-system.yaml output contract]
    may_change: [internal tone analysis algorithms, brand profiling strategy]
    must_not_change_without_cross_folder_update: [brand guidelines schema consumed by marketing/ and theme/ and canvas/]
    forbidden_local_patterns: [duplicating design tokens from theme/, duplicating campaign logic from marketing/]
  connections:
    upstream_inputs_from: [search/ (project context)]
    downstream_outputs_to: [brand-guidelines.md, voice-and-tone.md, content-constraints.md, messaging-system.yaml]
    directly_connected_subfolders: [marketing, theme, canvas]
    external_interfaces: [POST /v1/brand/generate, POST /v1/brand/export]
  human_surface: {touches_user_experience: true, primary_user_types: [marketer, content_creator, operator], trust_sensitive: true}
  canonical_truth:
    contract_artifacts: [brand-guidelines.md, voice-and-tone.md, content-constraints.md, messaging-system.yaml]
  active_state:
    status: planning
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no brand profiling engine]
    active_blockers: [requires search/ project context]
    next_canonical_move: "Define brand-guidelines.md output schema"
  semantic_memory:
    stable_facts: [Axis Brand is a wave-2 program, category is growth_and_content, promise is "Turn brand intent into enforceable AI content rules", acquisition_role is content_consistency]
    contract_facts: [outputs are brand-guidelines.md, voice-and-tone.md, content-constraints.md, messaging-system.yaml]
    naming_truth: [slug is "brand", full name is "Axis Brand"]
  cross_folder_sync:
    if_changed_update: [marketing/MEMORY.yaml, theme/MEMORY.yaml, canvas/MEMORY.yaml]
    drift_risk_if_unsynced: [marketing and visual programs depend on brand/ rules]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}
