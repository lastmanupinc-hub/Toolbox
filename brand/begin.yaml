project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Brand"
    category: "growth_and_content"
    boundary: >
      Content governance engine that structures tone, voice, and content constraints into
      reusable system files and prompt-ready guidance. Does not perform repo indexing,
      debugging, code governance, UI auditing, or SEO analysis.
    core_promise: "Turn brand intent into enforceable AI content rules."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: brand
    acquisition_role: content_consistency
    description: Structure tone, voice, and content constraints into reusable system files and prompt-ready guidance.
    free: [one_brand_profile, tone_preview]
    paid: [multiple_brand_kits, channel_specific_rules, team_sharing, export_packs, api_access]
    meters: [brand_profiles, generated_guidelines, channel_rulesets]
    outputs: [brand-guidelines.md, voice-and-tone.md, content-constraints.md, messaging-system.yaml]
    api_endpoints: [POST /v1/brand/generate, POST /v1/brand/export]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [brand_guidelines_schema, profiling_engine, brand_api, channel_rulesets]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
