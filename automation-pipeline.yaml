# Automation Pipeline
# Project: axis-toolbox
# Generated: 2026-04-14T02:25:34.684Z
# Summary: axis-toolbox is a monorepo built with TypeScript using React. It contains 500 files across 20 top-level directories. It defines 151 domain models.

pipeline:
  name: "axis-toolbox-automation"
  ci_platform: github_actions
  package_manager: pnpm

  stages:

    - name: install
      description: Install dependencies
      commands:
        - pnpm install
      cache:
        key: dependencies
        paths: [~/.pnpm-store]

    - name: lint
      description: Static analysis and linting
      depends_on: [install]
      commands:
        - pnpm tsc --noEmit
      fail_fast: true

    - name: test
      description: Run test suite
      depends_on: [install]
      parallel_with: [lint]
      commands:
        - pnpm vitest run
      coverage:
        minimum: 80
        report_format: lcov

    - name: build
      description: Build production artifacts
      depends_on: [lint, test]
      commands:
        - pnpm -r build
      artifacts:
        paths: [dist/, build/]
        retention: 30d

    - name: security_scan
      description: Dependency vulnerability audit
      depends_on: [install]
      parallel_with: [lint, test]
      commands:
        - pnpm audit --audit-level=high
      allow_failure: true

    - name: deploy_staging
      description: Deploy to staging environment
      depends_on: [build]
      trigger: branch:main
      environment: staging
      commands:
        - echo "Deploy to staging"
      rollback:
        automatic: true
        on_failure: revert_to_previous

    - name: deploy_production
      description: Deploy to production
      depends_on: [deploy_staging]
      trigger: manual
      environment: production
      approval_required: true
      commands:
        - echo "Deploy to production"
      rollback:
        automatic: false
        runbook: "See incident-template.md"

  notifications:
    on_failure:
      - channel: slack
        message: "Pipeline failed on {{branch}} — {{stage}}"
    on_success:
      - channel: slack
        message: "{{branch}} deployed to {{environment}}"

  schedules:
    - name: nightly_security
      cron: "0 2 * * *"
      stages: [install, security_scan]
    - name: weekly_full
      cron: "0 4 * * 1"
      stages: [install, lint, test, build]

