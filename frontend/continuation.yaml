      - repo_structure_from_search
      - snapshot_data
      - api_submission
    canonical_dependency_truth:
      search_context_map: required
      search_repo_profile: required
      framework_detection: required
    target_outputs_truth:
      frontend_rules_md: not_started
      component_guidelines_md: not_started
      layout_patterns_md: not_started
      ui_audit_md: not_started

  active_verticals:
