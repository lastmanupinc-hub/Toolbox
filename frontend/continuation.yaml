      next_required_move: "Define frontend-rules.md output schema"

    - id: v2_audit_engine
      name: UI Audit Engine
      status: planning
      priority: P1
      user_story: >
        As a developer, I need automated auditing of my frontend code against
        project standards.
      saturation:
        foundation: 0
        runtime: 0
        editor: 0
        export: 0
        polish: 0
      evidence: []
      blockers:
        - frontend rules schema must be defined first
      next_required_move: "Design audit pipeline architecture"

  subsystem_scorecards: []

  blocker_register:
