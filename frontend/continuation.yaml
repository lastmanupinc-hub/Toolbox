      name: Frontend Rules Schema
      status: planning
      priority: P0
      user_story: >
        As a developer, I need frontend rules generated from my project so
        my UI code matches established standards.
      saturation:
        foundation: 0
        runtime: 0
        editor: 0
        export: 0
        polish: 0
      evidence: []
