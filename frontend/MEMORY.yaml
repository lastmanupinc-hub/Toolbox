memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  purpose: >
    Constitutional local memory for the Axis Frontend subsystem.
    Supports fast reorientation, safe continuation, disciplined creativity,
    cross-folder coherence, and aggressive hygiene.

  use_contract:
    read_on_every_access: true
    audit_against_live_folder_on_every_access: true
    update_if_truth_changed: true
    run_exit_hygiene_after_each_completed_change: true
    forbid_skipping: true

  identity:
    folder_name: frontend
    canonical_path: frontend/
    system_role: >
      UI standards engine. Audits frontend code against project standards and
      generates component guidelines, layout patterns, and frontend rules to
      make UI work match the project's actual standards.
    global_dependency_reason: >
      Ensures frontend consistency and quality across projects that use Axis.
    in_scope:
      - UI audits
      - component guidelines generation
      - layout pattern documentation
      - frontend rules output (.ai/frontend-rules.md)
      - screen generation specifications
      - API access for frontend audits
    out_of_scope:
      - repo indexing or search (belongs to search/)
      - debugging or root cause analysis (belongs to debug/)
      - governance file generation (belongs to skills/)
      - SEO analysis (belongs to seo/)

  local_contract:
    must_preserve:
      - .ai/frontend-rules.md output contract
      - component-guidelines.md output contract
      - layout-patterns.md output contract
    may_change:
      - internal audit algorithms
      - guideline generation strategy
    must_not_change_without_cross_folder_update:
      - frontend rules schema if consumed by skills/ for governance
    forbidden_local_patterns:
      - duplicating context graph logic from search/
      - creating parallel snapshot ingestion
      - generating governance files (belongs to skills/)

  connections:
    upstream_inputs_from:
      - search/ (repo structure, context map)
      - root snapshot_protocol
    downstream_outputs_to:
      - .ai/frontend-rules.md
      - component-guidelines.md
      - layout-patterns.md
      - ui-audit.md
    directly_connected_subfolders:
      - search (consumes repo structure for audit context)
      - skills (may inform governance rules about frontend standards)
    external_interfaces:
      - POST /v1/frontend/audit
      - POST /v1/frontend/generate

  human_surface:
    touches_user_experience: true
    primary_user_types:
      - developer
      - designer
    user_visible_effects:
      - UI consistency
      - component quality
      - frontend development speed
    trust_sensitive: true

  canonical_truth:
    canonical_entrypoints: []
    critical_files: []
    golden_paths: []
    build_required_artifacts: []
    deploy_required_artifacts: []
    contract_artifacts:
      - .ai/frontend-rules.md
      - component-guidelines.md
      - layout-patterns.md
      - ui-audit.md

  active_state:
    status: planning
    currently_true:
      - subfolder created
      - MEMORY.yaml initialized
      - begin.yaml initialized
      - continuation.yaml initialized
    known_gaps:
      - no implementation code yet
      - no audit engine
      - no frontend API
    active_blockers:
      - requires search/ repo structure analysis to be available
    next_canonical_move: >
      Define frontend-rules.md and component-guidelines.md output schemas

  semantic_memory:
    stable_facts:
      - Axis Frontend is a first-wave program
      - category is engineering_delivery
      - promise is "Make UI work match the project's actual standards"
      - acquisition_role is design_dev_alignment
    boundary_facts:
      - meters are ui_audits, component_reviews, generated_specs
    contract_facts:
      - outputs are .ai/frontend-rules.md, component-guidelines.md, layout-patterns.md, ui-audit.md
    naming_truth:
      - slug is "frontend"
      - full name is "Axis Frontend"
    schema_truth: []

  episodic_memory:
    keep_only_high_value_episodes: true
    episodes: []

  procedural_memory:
    required_sequences: []
    validation_order: []
    recurrent_failure_patterns: []
    safe_edit_patterns: []
    unsafe_edit_patterns: []

  prospective_memory:
    pending_obligations:
      - obligation: Define output schemas for frontend-rules.md and component-guidelines.md
        trigger_condition: when search/ repo structure analysis is available
        due_when: before any frontend audit functionality is built
        owner_scope: frontend
        must_block_exit_if_unresolved: true
    expiry_checks: []

  creative_memory:
    latent_leverage_points:
      - leverage_point: frontend audits can feed back into skills/ governance generation
        why_it_exists_here: UI standards are a key governance surface
        what_it_could_unlock: automated UI consistency enforcement via governance files
        smallest_boundary_safe_probe: define audit output schema with governance-linkable fields
    adjacent_possible_moves: []
    semantic_tension_map: []

  provenance_memory:
    critical_claims: []
    contradiction_register: []

  cross_folder_sync:
    if_changed_update:
      - skills/MEMORY.yaml (if frontend standards inform governance rules)
    notify_contracts: []
    drift_risk_if_unsynced:
      - frontend depends on search/ repo structure staying stable

  hygiene:
    delete_on_exit:
      - temp
      - scratch
      - narrative
      - duplicate
      - recreatable
      - obsolete_evidence
    keep_on_exit:
      - runtime_required
      - build_required
      - deploy_required
      - canonical_contract
      - golden_path_required

  retention_review:
    required_after_each_completed_change: true
