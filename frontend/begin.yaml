project_begin:
  version: v1
  role: session_gate_and_move_selector

  project_identity:
    name: "Axis Frontend"
    category: "engineering_delivery"
    boundary: >
      UI standards engine that audits frontend code against project standards and
      generates component guidelines, layout patterns, and frontend rules. Does not
      perform repo indexing, debugging, governance generation, or SEO analysis.
    core_promise: >
      Make UI work match the project's actual standards.

  required_read_order:
    - read_this_file_first
    - then_read_continuation_yaml
    - then_read_MEMORY_yaml
    - then_choose_next_valid_move

  governing_root_files:
    - ../axis_all_tools.yaml
    - ../axis_master_blueprint.yaml
    - ../begin.yaml
    - ../automated remedial action.yaml
    - ../hygiene and memory.yaml
    - ../memory generator.yaml
    - ../rules to compile snapshot.yaml
    - ../human user audt.yaml

  program_spec:
    slug: frontend
    description: Audit frontend structure and produce component, layout, and interface rules aligned to the repo.
    acquisition_role: design_dev_alignment
    free_tier:
      - limited_ui_audits
      - preview_guidelines
    paid_tier:
      - full_ui_audits
      - component_guidelines
      - screen_generation
      - design_specs
      - api_access
    meters:
      - ui_audits
      - component_reviews
      - generated_specs
    outputs:
      - .ai/frontend-rules.md
      - component-guidelines.md
      - layout-patterns.md
      - ui-audit.md
    api_endpoints:
      - POST /v1/frontend/audit
      - POST /v1/frontend/generate

  optimization_policy:
    primary_rule: >
      Optimize for highest production quality and integration quality per unit
      resource. Do not optimize for time minimization, token minimization, or
      shortest-path output if that lowers quality.
    preference_order:
      - canonical_coherence
      - production_quality
      - integration_quality
      - active_vertical_advancement
      - durable_capability_gain
      - future_optionality

  operating_mode:
    work_style: monolithic_vertical_saturation
    planning_style: active_vertical_first
    canonical_policy: one_door_per_subsystem
    evidence_policy: evidence_required_for_promotion
    validation_policy: validate_before_promotion

  active_vertical_selection_policy:
    scope_rule: >
      Choose work from the highest-value active vertical or its direct blocker chain.
    allowed_verticals:
      - frontend_rules_schema
      - audit_engine
      - frontend_api
      - component_library

  session_begin_gate:
    all_must_be_true:
      - move_is_inside_boundary
      - move_advances_an_active_vertical_or_removes_its_blocker
      - move_is_on_a_canonical_path_or_explicitly_canonicalizes_one
      - move_scores_above_current_roi_threshold
      - move_does_not_duplicate_existing_capability
      - move_improves_production_or_integration_quality_per_resource
      - move_can_produce_evidence_by_session_end
    fail_behavior: choose_next_highest_valid_move

  refusal_surface:
    refuse_when:
      - move_is_outside_boundary
      - move_duplicates_existing_capability_or_path
      - move_reduces_canonical_coherence
      - move_inflates_feature_surface_without_vertical_gain
      - move_lowers_production_quality

  preferred_session_order:
    - read_continuation_yaml
    - read_MEMORY_yaml
    - determine_active_vertical
    - choose_highest_roi_move
    - implement_bounded_move
    - validate_and_capture_evidence
    - update_continuation_yaml
    - update_MEMORY_yaml
