# ─── Axis' Iliad — Render Blueprint ─────────────────────────────
#
# Deploy:  Connect this repo on Render → auto-detects render.yaml
# Docs:    https://docs.render.com/blueprint-spec

services:
  - type: web
    name: axis-api
    runtime: image
    image:
      url: ghcr.io/lastmanupinc-hub/axis-api:latest
      creds:
        fromRegistryCreds:
          name: ghcr-lastmanupinc
    plan: starter
    region: oregon
    healthCheckPath: /v1/health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/axis.db
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://axis-iliad.jonathanarvay.com
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: AXIS_WEB_URL
        value: https://axis-iliad.jonathanarvay.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: MPP_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    disk:
      name: axis-data
      mountPath: /data
      sizeGB: 1
