# ─── Axis' Iliad — Render Blueprint ─────────────────────────────
#
# Deploy:  Connect this repo on Render → auto-detects render.yaml
# Docs:    https://docs.render.com/blueprint-spec

services:
  - type: web
    name: axis-api
    runtime: image
    image:
      url: ghcr.io/lastmanupinc-hub/axis-api:latest
      creds:
        fromRegistryCreds:
          name: ghcr-lastmanupinc
    plan: starter
    region: oregon
    healthCheckPath: /v1/health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/axis.db
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://axis-iliad.jonathanarvay.com
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: AXIS_WEB_URL
        value: https://axis-iliad.jonathanarvay.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: MPP_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # ─── PAI'D Payment Processor (axis-pai-paid-api-main) ──────
      - key: PAID_API_BASE_URL
        value: https://axis-pai-paid-api-main.onrender.com/v1
      - key: PAID_MERCHANT_ID
        value: acct_7ec95648-c529-4ee2-9ab4-3fd22953ac1c
      - key: PAID_PLAN_PRO_MONTHLY
        value: plan_299dde3d-4db4-4f56-b572-a60c7c1d5f50
      - key: PAID_PLAN_PRO_ANNUAL
        value: plan_4cbd5d23-bd77-4421-99b5-4e6ef43b530f
      - key: PAID_API_KEY
        sync: false
      - key: PAID_API_SECRET
        sync: false
      - key: PAID_WEBHOOK_SIGNING_KEY
        sync: false
    disk:
      name: axis-data
      mountPath: /data
      sizeGB: 1
