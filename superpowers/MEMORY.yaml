memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: superpowers
    canonical_path: superpowers/
    system_role: >
      High-leverage workflow engine. Packages debugging, planning, testing, and refactoring
      actions into repeatable, project-aware tools for daily developer use.
    global_dependency_reason: "Provides sticky daily-use utility workflows that increase platform retention."
    in_scope: [workflow packaging, pipeline automation, team playbooks, test generation rules, refactor checklists, reusable actions, API access]
    out_of_scope: [repo indexing (search/), debugging analysis (debug/), governance (skills/), UI auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [superpower-pack.md output contract, workflow-registry.json output contract, test-generation-rules.md output contract, refactor-checklist.md output contract]
    must_not_change_without_cross_folder_update: [workflow-registry.json if consumed by mcp/]
    forbidden_local_patterns: [duplicating debug playbooks from debug/, duplicating governance workflows from skills/]
  connections:
    upstream_inputs_from: [search/ (project context), debug/ (debug patterns), mcp/ (capability registry)]
    downstream_outputs_to: [superpower-pack.md, workflow-registry.json, test-generation-rules.md, refactor-checklist.md]
    directly_connected_subfolders: [search, debug, mcp]
    external_interfaces: [POST /v1/superpowers/generate, POST /v1/superpowers/export]
  human_surface: {touches_user_experience: true, primary_user_types: [developer, team_lead], trust_sensitive: false}
  canonical_truth:
    contract_artifacts: [superpower-pack.md, workflow-registry.json, test-generation-rules.md, refactor-checklist.md]
  active_state:
    status: generators_complete
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no workflow engine]
    active_blockers: [requires search/ and debug/ context]
    next_canonical_move: "Define workflow-registry.json schema"
  semantic_memory:
    stable_facts: [Axis Superpowers is a wave-3 program, category is engineering_delivery, promise is "Give builders reusable high-leverage development workflows", acquisition_role is sticky_daily_utility]
    contract_facts: [outputs are superpower-pack.md, workflow-registry.json, test-generation-rules.md, refactor-checklist.md]
    naming_truth: [slug is "superpowers", full name is "Axis Superpowers"]
  cross_folder_sync:
    if_changed_update: [mcp/MEMORY.yaml if workflow registry affects capability registry]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}

