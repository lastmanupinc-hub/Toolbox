project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Superpowers"
    category: "engineering_delivery"
    boundary: >
      High-leverage workflow engine packaging debugging, planning, testing, and refactoring
      actions into repeatable, project-aware tools. Does not perform repo indexing,
      debug analysis, governance generation, UI auditing, or SEO analysis.
    core_promise: "Give builders reusable high-leverage development workflows."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: superpowers
    acquisition_role: sticky_daily_utility
    description: Package debugging, planning, testing, and refactoring actions into repeatable, project-aware tools.
    free: [utility_level_functions, limited_runs]
    paid: [project_workflows, pipeline_automation, team_playbooks, reusable_actions, api_access]
    meters: [workflow_runs, generated_playbooks, pipeline_jobs]
    outputs: [superpower-pack.md, workflow-registry.json, test-generation-rules.md, refactor-checklist.md]
    api_endpoints: [POST /v1/superpowers/generate, POST /v1/superpowers/export]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [workflow_registry_schema, workflow_engine, superpowers_api, action_library]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
