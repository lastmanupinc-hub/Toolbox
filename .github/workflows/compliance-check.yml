name: Compliance Check

on:
  pull_request:
    branches: [main, "release/**"]
  push:
    branches: [main]

jobs:
  compliance:
    name: AP2 / Visa Compliance Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Axis compliance check
        uses: ./.github/actions/compliance-check
        with:
          api-key: ${{ secrets.AXIS_API_KEY }}
          minimum-grade: "B"
          lite-mode: "true"
