name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Build all packages
        run: pnpm -r build

      - name: Run tests with coverage
        run: npx vitest run --coverage --coverage.provider=v8 --coverage.reporter=text --coverage.reporter=json-summary --coverage.reportDir=coverage

      - name: Type-check
        run: pnpm -r exec tsc --noEmit

      - name: Artifact freshness gate
        run: npx tsx scripts/check-artifact-freshness.ts

      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/lastmanupinc-hub/axis-api:latest \
            -t ghcr.io/lastmanupinc-hub/axis-api:${{ github.sha }} \
            .

      - name: Verify Docker health check
        run: |
          docker run -d --name axis-test -p 4000:4000 \
            -e DATABASE_PATH=/tmp/axis.db \
            -v /tmp/axis-data:/tmp \
            ghcr.io/lastmanupinc-hub/axis-api:${{ github.sha }}
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost:4000/v1/health | grep -q '"status":"ok"'; then
              echo "Health check passed on attempt $i"
              break
            fi
            if [ "$i" -eq 6 ]; then
              echo "All attempts failed. Container logs:"
              docker logs axis-test
            fi
            sleep 5
          done
          curl -sf http://localhost:4000/v1/health | grep -q '"status":"ok"'
          docker stop axis-test
          docker rm axis-test

      - name: Push to GHCR
        run: |
          docker push ghcr.io/lastmanupinc-hub/axis-api:latest
          docker push ghcr.io/lastmanupinc-hub/axis-api:${{ github.sha }}

  # G—úG—ú Deploy API to Render G—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—ú
  # Render pulls the pre-built image from ghcr.io/lastmanupinc-hub/axis-api:latest
  # Configure Render service to use "Image" deploy with that URL.
  # No build minutes consumed Gú— image is built by GitHub Actions above.

  # G—úG—ú Deploy Web to Cloudflare Pages G—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—úG—ú
  deploy-web:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        env:
          VITE_API_URL: https://axis-api-6c7z.onrender.com
        run: pnpm -r build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages deploy apps/web/dist --project-name=axis-web --commit-dirty=true
        continue-on-error: true
