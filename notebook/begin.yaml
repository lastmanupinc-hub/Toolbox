project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Notebook"
    category: "knowledge_and_context"
    boundary: >
      Research artifact engine that builds project-specific notebooks, summaries, and
      source-linked outputs from uploaded materials. Does not perform repo indexing,
      debugging, governance generation, UI auditing, or SEO analysis.
    core_promise: "Turn source materials into structured research artifacts."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: notebook
    acquisition_role: research_and_context
    description: Build project-specific notebooks, summaries, and source-linked outputs from uploaded materials.
    free: [limited_uploads, summary_preview]
    paid: [larger_collections, saved_notebooks, export_artifacts, workflow_generation, api_access]
    meters: [uploaded_sources, notebook_generations, exports]
    outputs: [notebook-summary.md, source-map.json, study-brief.md, research-threads/]
    api_endpoints: [POST /v1/notebook/generate, POST /v1/notebook/export]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [notebook_schema, summarization_engine, notebook_api, source_linking]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
