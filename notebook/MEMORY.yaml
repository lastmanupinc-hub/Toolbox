memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: notebook
    canonical_path: notebook/
    system_role: >
      Research artifact engine. Builds project-specific notebooks, summaries, and
      source-linked outputs from uploaded materials.
    global_dependency_reason: "Provides structured research and source context that feeds into other programs."
    in_scope: [source material processing, notebook generation, summary creation, source map compilation, study brief output, research thread management, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance (skills/), UI auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [notebook-summary.md output contract, source-map.json output contract, study-brief.md output contract, research-threads/ output contract]
    may_change: [internal summarization strategy, source linking algorithms]
    must_not_change_without_cross_folder_update: [source-map.json schema if consumed by other programs]
    forbidden_local_patterns: [duplicating context graph from search/]
  connections:
    upstream_inputs_from: [search/ (project context), user uploads]
    downstream_outputs_to: [notebook-summary.md, source-map.json, study-brief.md, research-threads/]
    directly_connected_subfolders: [search, obsidian]
    external_interfaces: [POST /v1/notebook/generate, POST /v1/notebook/export]
  human_surface: {touches_user_experience: true, primary_user_types: [researcher, developer, analyst], trust_sensitive: true}
  canonical_truth:
    contract_artifacts: [notebook-summary.md, source-map.json, study-brief.md, research-threads/]
  active_state:
    status: generators_complete
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no summarization engine]
    active_blockers: [requires search/ context]
    next_canonical_move: "Define notebook-summary.md and source-map.json schemas"
  semantic_memory:
    stable_facts: [Axis Notebook is a wave-2 program, category is knowledge_and_context, promise is "Turn source materials into structured research artifacts", acquisition_role is research_and_context]
    contract_facts: [outputs are notebook-summary.md, source-map.json, study-brief.md, research-threads/]
    naming_truth: [slug is "notebook", full name is "Axis Notebook"]
  cross_folder_sync:
    if_changed_update: [obsidian/MEMORY.yaml if source-map schema changes]
    drift_risk_if_unsynced: [obsidian/ may depend on notebook/ source maps]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}

