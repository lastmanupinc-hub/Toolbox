project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis MCP"
    category: "engineering_delivery"
    boundary: >
      Integration protocol engine providing private, hosted MCP endpoints and capability
      orchestration for build workflows. Does not perform repo indexing, debugging,
      governance generation, UI auditing, or SEO analysis.
    core_promise: "Connect tools and services through a hosted protocol layer."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: mcp
    acquisition_role: integration_moat
    description: Provide private, hosted MCP endpoints and capability orchestration for build workflows.
    free: [sandbox_server, limited_connections]
    paid: [hosted_private_endpoints, persistent_configs, auth_management, usage_logs, webhooks]
    meters: [active_connectors, endpoint_calls, hosted_servers]
    outputs: [mcp-config.json, connector-map.yaml, capability-registry.json]
    api_endpoints: [POST /v1/mcp/provision, POST /v1/mcp/configure, GET /v1/mcp/registry]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [mcp_config_schema, provisioning_engine, mcp_api, connector_system]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
