memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: mcp
    canonical_path: mcp/
    system_role: >
      Integration protocol engine. Provides private, hosted MCP endpoints and capability
      orchestration for build workflows.
    global_dependency_reason: "Provides the integration moat connecting external tools and services into the Axis ecosystem."
    in_scope: [MCP endpoint provisioning, connector configuration, capability registry, auth management, usage logging, webhooks, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance (skills/), UI auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [mcp-config.json output contract, connector-map.yaml output contract, capability-registry.json output contract]
    must_not_change_without_cross_folder_update: [capability-registry.json schema if consumed by superpowers/]
    forbidden_local_patterns: [duplicating auth from platform shared layer]
  connections:
    upstream_inputs_from: [search/ (project context), platform shared auth]
    downstream_outputs_to: [mcp-config.json, connector-map.yaml, capability-registry.json]
    directly_connected_subfolders: [superpowers]
    external_interfaces: [POST /v1/mcp/provision, POST /v1/mcp/configure, GET /v1/mcp/registry]
  human_surface: {touches_user_experience: true, primary_user_types: [developer, integrator], trust_sensitive: true}
  canonical_truth:
    contract_artifacts: [mcp-config.json, connector-map.yaml, capability-registry.json]
  active_state:
    status: generators_complete
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no endpoint provisioning]
    active_blockers: [requires platform auth layer]
    next_canonical_move: "Define mcp-config.json and capability-registry.json schemas"
  semantic_memory:
    stable_facts: [Axis MCP is a wave-3 program, category is engineering_delivery, promise is "Connect tools and services through a hosted protocol layer", acquisition_role is integration_moat]
    contract_facts: [outputs are mcp-config.json, connector-map.yaml, capability-registry.json]
    naming_truth: [slug is "mcp", full name is "Axis MCP"]
  cross_folder_sync:
    if_changed_update: [superpowers/MEMORY.yaml if capability registry changes]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}

