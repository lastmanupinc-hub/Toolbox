memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  purpose: >
    Constitutional local memory for the Axis Skills subsystem.
    Supports fast reorientation, safe continuation, disciplined creativity,
    cross-folder coherence, and aggressive hygiene.

  use_contract:
    read_on_every_access: true
    audit_against_live_folder_on_every_access: true
    update_if_truth_changed: true
    run_exit_hygiene_after_each_completed_change: true
    forbid_skipping: true

  identity:
    folder_name: skills
    canonical_path: skills/
    system_role: >
      Governance file generator. Produces project-specific AI governance files
      (AGENTS.md, CLAUDE.md, CURSOR.md, .cursorrules) and workflow/policy libraries
      from project snapshots.
    global_dependency_reason: >
      Generates the governance layer that controls how AI tools interact with
      any given project. Core differentiator for the Axis platform.
    in_scope:
      - AGENTS.md generation
      - CLAUDE.md generation
      - CURSOR.md generation
      - .cursorrules generation
      - workflow library generation (.ai/workflows/)
      - policy library generation (.ai/policies/)
      - versioned governance
      - API access for skills
    out_of_scope:
      - repo indexing or search (belongs to search/)
      - debugging or root cause analysis (belongs to debug/)
      - UI audit or component guidelines (belongs to frontend/)
      - SEO analysis (belongs to seo/)

  local_contract:
    must_preserve:
      - AGENTS.md output contract
      - CLAUDE.md output contract
      - CURSOR.md output contract
      - .cursorrules output contract
      - .ai/workflows/ output contract
      - .ai/policies/ output contract
    may_change:
      - internal generation templates
      - governance rule inference strategy
    must_not_change_without_cross_folder_update:
      - governance file schema consumed by downstream tools
    forbidden_local_patterns:
      - duplicating context graph logic from search/
      - creating parallel snapshot ingestion
      - generating debug-specific files (belongs to debug/)

  connections:
    upstream_inputs_from:
      - search/ (repo profile, context map)
      - root snapshot_protocol
    downstream_outputs_to:
      - AGENTS.md
      - CLAUDE.md
      - CURSOR.md
      - .cursorrules
      - .ai/workflows/
      - .ai/policies/
    directly_connected_subfolders:
      - search (consumes repo profile for governance context)
      - debug (may consume debug patterns for governance rules)
    external_interfaces:
      - POST /v1/skills/generate
      - POST /v1/skills/export

  human_surface:
    touches_user_experience: true
    primary_user_types:
      - developer
      - operator
    user_visible_effects:
      - AI tool governance accuracy
      - project coding standards enforcement
      - workflow standardization
    trust_sensitive: true

  canonical_truth:
    canonical_entrypoints: []
    critical_files: []
    golden_paths: []
    build_required_artifacts: []
    deploy_required_artifacts: []
    contract_artifacts:
      - AGENTS.md
      - CLAUDE.md
      - CURSOR.md
      - .cursorrules
      - .ai/workflows/
      - .ai/policies/

  active_state:
    status: planning
    currently_true:
      - subfolder created
      - MEMORY.yaml initialized
      - begin.yaml initialized
      - continuation.yaml initialized
    known_gaps:
      - no implementation code yet
      - no generation templates
      - no skills API
    active_blockers:
      - requires search/ repo profile to be available
    next_canonical_move: >
      Define governance file output templates and generation rules

  semantic_memory:
    stable_facts:
      - Axis Skills is a first-wave program
      - category is governance
      - promise is "Generate project-specific AI governance files"
      - acquisition_role is governance_anchor
    boundary_facts:
      - meters are generated_files, governance_runs
    contract_facts:
      - outputs are AGENTS.md, CLAUDE.md, CURSOR.md, .cursorrules, .ai/workflows/, .ai/policies/
    naming_truth:
      - slug is "skills"
      - full name is "Axis Skills"
    schema_truth: []

  episodic_memory:
    keep_only_high_value_episodes: true
    episodes: []

  procedural_memory:
    required_sequences: []
    validation_order: []
    recurrent_failure_patterns: []
    safe_edit_patterns: []
    unsafe_edit_patterns: []

  prospective_memory:
    pending_obligations:
      - obligation: Define governance file templates for all 4 root outputs
        trigger_condition: when search/ repo profile schema is available
        due_when: before any governance generation is built
        owner_scope: skills
        must_block_exit_if_unresolved: true
    expiry_checks: []

  creative_memory:
    latent_leverage_points:
      - leverage_point: governance files define how all AI tools interact with projects
        why_it_exists_here: skills is the AI-governance layer of the platform
        what_it_could_unlock: cross-tool consistency and standards enforcement
        smallest_boundary_safe_probe: define minimal AGENTS.md template schema
    adjacent_possible_moves: []
    semantic_tension_map: []

  provenance_memory:
    critical_claims: []
    contradiction_register: []

  cross_folder_sync:
    if_changed_update:
      - frontend/MEMORY.yaml (if governance rules affect frontend standards)
    notify_contracts: []
    drift_risk_if_unsynced:
      - governance files must reflect actual repo capabilities from search/

  hygiene:
    delete_on_exit:
      - temp
      - scratch
      - narrative
      - duplicate
      - recreatable
      - obsolete_evidence
    keep_on_exit:
      - runtime_required
      - build_required
      - deploy_required
      - canonical_contract
      - golden_path_required

  retention_review:
    required_after_each_completed_change: true
