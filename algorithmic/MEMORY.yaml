memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: algorithmic
    canonical_path: algorithmic/
    system_role: >
      Generative art engine. Produces algorithmic visuals, parameter systems, and
      code artifacts for creative technical output.
    global_dependency_reason: "Provides experimental creative surface area for generative visual systems."
    in_scope: [generative sketch creation, parameter pack management, collection mapping, export manifests, HD exports, downloadable code, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance (skills/), UI auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [generative-sketch.ts output contract, parameter-pack.json output contract, collection-map.md output contract, export-manifest.yaml output contract]
    must_not_change_without_cross_folder_update: [parameter schema if consumed by canvas/]
    forbidden_local_patterns: [duplicating design tokens from theme/, duplicating canvas specs from canvas/]
  connections:
    upstream_inputs_from: [theme/ (design tokens), canvas/ (visual specs)]
    downstream_outputs_to: [generative-sketch.ts, parameter-pack.json, collection-map.md, export-manifest.yaml]
    directly_connected_subfolders: [theme, canvas]
    external_interfaces: [POST /v1/algorithmic/generate, POST /v1/algorithmic/export]
  human_surface: {touches_user_experience: true, primary_user_types: [creative_developer, designer, artist], trust_sensitive: false}
  canonical_truth:
    contract_artifacts: [generative-sketch.ts, parameter-pack.json, collection-map.md, export-manifest.yaml]
  active_state:
    status: planning
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no generative engine]
    active_blockers: [requires theme/ design tokens]
    next_canonical_move: "Define generative-sketch.ts and parameter-pack.json schemas"
  semantic_memory:
    stable_facts: [Axis Algorithmic is a wave-3 program, category is creative_generation, promise is "Create generative visual systems and exportable art logic", acquisition_role is experimental_surface_area]
    contract_facts: [outputs are generative-sketch.ts, parameter-pack.json, collection-map.md, export-manifest.yaml]
    naming_truth: [slug is "algorithmic", full name is "Axis Algorithmic"]
  cross_folder_sync:
    if_changed_update: [canvas/MEMORY.yaml if generative schemas affect canvas output]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}
