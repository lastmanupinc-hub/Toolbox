project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Algorithmic"
    category: "creative_generation"
    boundary: >
      Generative art engine producing algorithmic visuals, parameter systems, and code
      artifacts for creative technical output. Does not perform repo indexing, debugging,
      governance generation, UI auditing, or SEO analysis.
    core_promise: "Create generative visual systems and exportable art logic."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: algorithmic
    acquisition_role: experimental_surface_area
    description: Produce algorithmic visuals, parameter systems, and code artifacts for creative technical output.
    free: [preview_generations, limited_parameter_runs]
    paid: [hd_exports, downloadable_code, collections, reusable_parameter_sets, api_access]
    meters: [generation_runs, hd_exports, code_downloads]
    outputs: [generative-sketch.ts, parameter-pack.json, collection-map.md, export-manifest.yaml]
    api_endpoints: [POST /v1/algorithmic/generate, POST /v1/algorithmic/export]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [generative_schema, rendering_engine, algorithmic_api, parameter_system]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
