memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: canvas
    canonical_path: canvas/
    system_role: >
      Design asset engine. Creates posters, social assets, panels, and visual surfaces
      aligned to the Axis system theme.
    global_dependency_reason: "Provides structured visual asset generation within the Axis design language."
    in_scope: [poster generation, social asset creation, panel layouts, visual surface design, brand kit integration, batch generation, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance (skills/), UI auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [canvas-spec.json output contract, social-pack/ output contract, poster-layouts/ output contract, asset-guidelines.md output contract]
    must_not_change_without_cross_folder_update: [canvas-spec.json if consumed by remotion/ or algorithmic/]
    forbidden_local_patterns: [duplicating design tokens from theme/, duplicating brand rules from brand/]
  connections:
    upstream_inputs_from: [theme/ (design tokens), brand/ (brand rules)]
    downstream_outputs_to: [canvas-spec.json, social-pack/, poster-layouts/, asset-guidelines.md]
    directly_connected_subfolders: [theme, brand, remotion, algorithmic]
    external_interfaces: [POST /v1/canvas/generate, POST /v1/canvas/export]
  human_surface: {touches_user_experience: true, primary_user_types: [designer, marketer, content_creator], trust_sensitive: false}
  canonical_truth:
    contract_artifacts: [canvas-spec.json, social-pack/, poster-layouts/, asset-guidelines.md]
  active_state:
    status: planning
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no asset generation engine]
    active_blockers: [requires theme/ and brand/ context]
    next_canonical_move: "Define canvas-spec.json schema"
  semantic_memory:
    stable_facts: [Axis Canvas is a wave-3 program, category is creative_generation, promise is "Generate structured design assets in the Axis visual language", acquisition_role is creative_surface_area]
    contract_facts: [outputs are canvas-spec.json, social-pack/, poster-layouts/, asset-guidelines.md]
    naming_truth: [slug is "canvas", full name is "Axis Canvas"]
  cross_folder_sync:
    if_changed_update: [algorithmic/MEMORY.yaml if canvas-spec schema affects generative output]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}
