project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Canvas"
    category: "creative_generation"
    boundary: >
      Design asset engine creating posters, social assets, panels, and visual surfaces
      aligned to the system theme. Does not perform repo indexing, debugging, governance
      generation, UI auditing, or SEO analysis.
    core_promise: "Generate structured design assets in the Axis visual language."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: canvas
    acquisition_role: creative_surface_area
    description: Create posters, social assets, panels, and visual surfaces aligned to the system theme.
    free: [watermarked_exports, limited_templates]
    paid: [clean_exports, brand_kits, batch_generation, reusable_templates, api_access]
    meters: [canvas_generations, asset_exports, batch_jobs]
    outputs: [canvas-spec.json, social-pack/, poster-layouts/, asset-guidelines.md]
    api_endpoints: [POST /v1/canvas/generate, POST /v1/canvas/export]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [canvas_spec_schema, asset_generation_engine, canvas_api, template_system]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
