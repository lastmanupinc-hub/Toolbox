  section_2_canonical_product_map:
    product_identity_as_evidenced_by_repo_truth: >
      AXIS Toolbox is a developer-tools SaaS platform that ingests source code repositories
      (via local filesystem scan or GitHub URL), parses them into structured representations
      (ContextMap, RepoProfile), and runs 80 AI-ready generators across 17 specialized programs
      to produce configuration files, audits, design tokens, documentation, and tooling artifacts.
      The product serves developers who want automated codebase analysis and artifact generation.
    canonical_runtime_backend_path: "apps/api/src/"
    canonical_frontend_path: "apps/web/src/"
    canonical_control_files:
      - "begin.yaml"
      - "continuation.yaml"
      - "capability_inventory.yaml"
      - "axis_all_tools.yaml"
      - "axis_master_blueprint.yaml"
      - "snapshot_protocol.yaml"
      - "static_analysis_phase.yaml"
      - "rules to compile snapshot.yaml"
      - "e2e_ui_audit.yaml"
      - "automated remedial action.yaml"
      - "human user audt.yaml"
      - "hygiene and memory.yaml"
      - "memory generator.yaml"
      - "stalling fix.txt"
    canonical_deploy_path:
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"
    canonical_integration_path:
      - "packages/snapshots/src/github.ts"
      - "packages/snapshots/src/github-token-store.ts"
    canonical_human_facing_entry_path: "apps/web/src/App.tsx"
    canonical_operator_admin_path: null
    unresolved_ambiguities:
      - "Two axis.db databases exist: root (4KB, likely stale) and apps/api/axis.db (115MB, active). Only apps/api/ is the canonical runtime DB path."
      - "Version skew: root package.json says 0.4.0, CLI reports 0.3.0, web badge shows v0.3.1. No single source of truth for display version."

