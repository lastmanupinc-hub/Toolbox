  section_12_blockers_and_integrity_risks:
    hard_limiters:
      - "No payment provider integration — billing tiers exist (free/pro/suite) with quota enforcement, but no Stripe/PayPal/etc. processes actual payments. Tier changes are API-only."

    canonical_path_risks:
      - "Two axis.db files exist (root 4KB stale, apps/api/ 115MB active). A consumer or deployment script targeting the wrong DB would get empty data."

    production_truth_risks:
      - "CORS is set to '*' — appropriate for development but must be restricted for production deployment."
      - "Dockerfile exposes port 5173 (Vite dev server) alongside 4000 (API) — 5173 is irrelevant in production."

    human_facing_truth_risks:
      - "PlansPage shows pricing tiers and upgrade buttons but no actual purchase flow exists. A user clicking 'upgrade' would need manual API intervention."

    deploy_runtime_risks:
      - "Migrations run automatically on DB open (runMigrations in db.ts). No rollback mechanism exists for failed migrations."
      - "Rate limiter persists to SQLite with 30s flush interval — data loss window on crash."

    provider_coverage_risks:
      - "Only GitHub is integrated as an external source provider. No GitLab, Bitbucket, or generic Git integration."

    narrative_vs_product_risks:
      - "continuation.yaml claims 1790 tests but actual count is 2226 — 436 test deficit in control file."
      - "Version display skew: root 0.4.0, CLI 0.3.0, web v0.3.1. Users/graders see inconsistent version identifiers."
      - "payment-processing-output/ directory contains generated artifacts from an external repo analysis — could mislead a grader into thinking AXIS has payment processing capabilities."

