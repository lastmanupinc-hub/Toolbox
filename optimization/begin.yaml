project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Optimization"
    category: "repo_intelligence"
    boundary: >
      Efficiency engine that analyzes prompts, context packing, and model workflows
      for cost, clarity, and output quality. Does not perform repo indexing, debugging,
      governance generation, UI auditing, or SEO analysis.
    core_promise: "Reduce waste and improve prompt and context efficiency."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files:
    - ../axis_all_tools.yaml
    - ../begin.yaml
    - ../automated remedial action.yaml
    - ../hygiene and memory.yaml
    - ../memory generator.yaml
  program_spec:
    slug: optimization
    acquisition_role: efficiency_entry_point
    description: Analyze prompts, context packing, and model workflows for cost, clarity, and output quality.
    free: [single_analysis, optimization_score_preview]
    paid: [batch_optimization, before_after_comparisons, cost_reports, organization_rules, api_access]
    meters: [optimization_runs, compared_prompts, batch_jobs]
    outputs: [.ai/optimization-rules.md, prompt-diff-report.md, cost-estimate.json]
    api_endpoints: [POST /v1/optimization/analyze, POST /v1/optimization/generate]
  optimization_policy:
    primary_rule: >
      Optimize for highest production quality and integration quality per unit resource.
    preference_order: [canonical_coherence, production_quality, integration_quality, active_vertical_advancement, durable_capability_gain, future_optionality]
  operating_mode:
    work_style: monolithic_vertical_saturation
    canonical_policy: one_door_per_subsystem
    evidence_policy: evidence_required_for_promotion
  active_vertical_selection_policy:
    allowed_verticals: [optimization_rules_schema, analysis_engine, optimization_api, batch_processing]
  session_begin_gate:
    all_must_be_true: [move_is_inside_boundary, move_advances_an_active_vertical_or_removes_its_blocker, move_scores_above_current_roi_threshold, move_does_not_duplicate_existing_capability, move_can_produce_evidence_by_session_end]
    fail_behavior: choose_next_highest_valid_move
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
