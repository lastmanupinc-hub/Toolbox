memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"

  use_contract:
    read_on_every_access: true
    audit_against_live_folder_on_every_access: true
    update_if_truth_changed: true
    run_exit_hygiene_after_each_completed_change: true
    forbid_skipping: true

  identity:
    folder_name: optimization
    canonical_path: optimization/
    system_role: >
      Efficiency engine. Analyzes prompts, context packing, and model workflows
      for cost, clarity, and output quality. Reduces waste across AI interactions.
    global_dependency_reason: >
      Provides optimization intelligence that improves token efficiency and
      output quality across all Axis programs.
    in_scope:
      - prompt analysis
      - context packing optimization
      - cost reporting
      - before/after comparisons
      - batch optimization
      - organization-wide rules
      - API access for optimization
    out_of_scope:
      - repo indexing (search/)
      - debugging (debug/)
      - governance generation (skills/)
      - UI auditing (frontend/)
      - SEO analysis (seo/)

  local_contract:
    must_preserve:
      - .ai/optimization-rules.md output contract
      - prompt-diff-report.md output contract
      - cost-estimate.json output contract
    may_change:
      - internal analysis algorithms
      - optimization scoring model
    must_not_change_without_cross_folder_update:
      - optimization rules schema if consumed by skills/
    forbidden_local_patterns:
      - duplicating context graph logic from search/

  connections:
    upstream_inputs_from:
      - search/ (context map for prompt context)
      - root snapshot_protocol
    downstream_outputs_to:
      - .ai/optimization-rules.md
      - prompt-diff-report.md
      - cost-estimate.json
    directly_connected_subfolders:
      - search (consumes context for optimization analysis)
      - skills (may feed optimization rules into governance)
    external_interfaces:
      - POST /v1/optimization/analyze
      - POST /v1/optimization/generate

  human_surface:
    touches_user_experience: true
    primary_user_types: [developer, operator]
    user_visible_effects: [token cost reduction, prompt quality improvement]
    trust_sensitive: true

  canonical_truth:
    canonical_entrypoints: []
    critical_files: []
    contract_artifacts:
      - .ai/optimization-rules.md
      - prompt-diff-report.md
      - cost-estimate.json

  active_state:
    status: generators_complete
    currently_true: [subfolder created, MEMORY.yaml initialized, begin.yaml initialized, continuation.yaml initialized]
    known_gaps: [no implementation code, no analysis engine, no optimization API]
    active_blockers: [requires search/ context map]
    next_canonical_move: "Define optimization-rules.md output schema"

  semantic_memory:
    stable_facts:
      - Axis Optimization is a wave-2 program
      - category is repo_intelligence
      - promise is "Reduce waste and improve prompt and context efficiency"
      - acquisition_role is efficiency_entry_point
    contract_facts:
      - outputs are .ai/optimization-rules.md, prompt-diff-report.md, cost-estimate.json
    naming_truth: [slug is "optimization", full name is "Axis Optimization"]

  cross_folder_sync:
    if_changed_update: [skills/MEMORY.yaml if optimization rules inform governance]
    drift_risk_if_unsynced: [optimization depends on search/ context map]

  hygiene:
    delete_on_exit: [temp, scratch, narrative, duplicate, recreatable]
    keep_on_exit: [runtime_required, build_required, canonical_contract]
  retention_review:
    required_after_each_completed_change: true

