memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: obsidian
    canonical_path: obsidian/
    system_role: >
      PKM integration engine. Generates vault-aware workflows, linking rules, and
      knowledge graph helpers for Obsidian users.
    global_dependency_reason: "Extends Axis into personal knowledge management ecosystems."
    in_scope: [vault analysis, graph workflows, skill pack generation, linking policy, export/import tools, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance (skills/), UI auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [obsidian-skill-pack/ output contract, vault-rules.md output contract, graph-prompt-map.json output contract, linking-policy.md output contract]
    must_not_change_without_cross_folder_update: [vault schema if consumed by notebook/]
    forbidden_local_patterns: [duplicating notebook summarization from notebook/]
  connections:
    upstream_inputs_from: [search/ (project context), notebook/ (source maps)]
    downstream_outputs_to: [obsidian-skill-pack/, vault-rules.md, graph-prompt-map.json, linking-policy.md]
    directly_connected_subfolders: [notebook, search]
    external_interfaces: [POST /v1/obsidian/analyze, POST /v1/obsidian/generate]
  human_surface: {touches_user_experience: true, primary_user_types: [knowledge_worker, researcher, developer], trust_sensitive: true}
  canonical_truth:
    contract_artifacts: [obsidian-skill-pack/, vault-rules.md, graph-prompt-map.json, linking-policy.md]
  active_state:
    status: generators_complete
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no vault analysis engine]
    active_blockers: [requires search/ and notebook/ context]
    next_canonical_move: "Define vault-rules.md and graph-prompt-map.json schemas"
  semantic_memory:
    stable_facts: [Axis Obsidian is a wave-3 program, category is knowledge_and_context, promise is "Bring structured AI workflows into vault-based knowledge systems", acquisition_role is pkm_specialization]
    contract_facts: [outputs are obsidian-skill-pack/, vault-rules.md, graph-prompt-map.json, linking-policy.md]
    naming_truth: [slug is "obsidian", full name is "Axis Obsidian"]
  cross_folder_sync:
    if_changed_update: [notebook/MEMORY.yaml if vault schemas affect source maps]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}

