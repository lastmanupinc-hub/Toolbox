project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Obsidian"
    category: "knowledge_and_context"
    boundary: >
      PKM integration engine generating vault-aware workflows, linking rules, and
      knowledge graph helpers for Obsidian users. Does not perform repo indexing,
      debugging, governance generation, UI auditing, or SEO analysis.
    core_promise: "Bring structured AI workflows into vault-based knowledge systems."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: obsidian
    acquisition_role: pkm_specialization
    description: Generate vault-aware workflows, linking rules, and knowledge graph helpers for Obsidian users.
    free: [basic_vault_helpers, limited_skill_packs]
    paid: [advanced_vault_analysis, graph_workflows, premium_skill_packs, export_import_tools, api_access]
    meters: [vault_analyses, graph_runs, pack_exports]
    outputs: [obsidian-skill-pack/, vault-rules.md, graph-prompt-map.json, linking-policy.md]
    api_endpoints: [POST /v1/obsidian/analyze, POST /v1/obsidian/generate]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [vault_rules_schema, graph_engine, obsidian_api, skill_pack_system]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
