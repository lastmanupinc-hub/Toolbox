project_continuation:
  version: v1
  role: live_state_ledger_and_post_session_truth

  reference_policy:
    before_session:
      read:
        - begin.yaml
        - continuation.yaml
        - MEMORY.yaml
    after_session:
      update_this_file: true
      update_memory_yaml: true

  current_identity:
    project_name: "Axis SEO"
    date: "2026-04-03"
    commit_or_tag: ""
    current_session_id: "init"
    one_sentence_summary: "Subfolder initialized with MEMORY, begin, and continuation YAMLs."
    current_status: "planning"
    current_focus_vertical: "seo_rules_schema"

  executive_truth:
    maturity_estimate:
      functional_percent: 0
      hardened_percent: 0
      integrated_percent: 0
      production_percent: 0
    confidence:
      architecture_confidence: 0
      runtime_confidence: 0
      pipeline_confidence: 0
      integration_confidence: 0
      notes: "No implementation yet. Planning phase."

  boundary_truth:
    accepted_input_modes:
      - route_map_from_search
      - snapshot_data
      - api_submission
    canonical_dependency_truth:
      search_context_map: required
      search_route_map: required
      framework_detection: required
    target_outputs_truth:
      seo_rules_md: not_started
      schema_recommendations_json: not_started
      route_priority_map_md: not_started
      content_audit_md: not_started

  active_verticals:
    - id: v1_seo_rules
      name: SEO Rules Schema
      status: planning
      priority: P0
      user_story: >
        As a developer, I need SEO rules generated from my project routes so
        I can improve discoverability without leaving my IDE.
      saturation:
        foundation: 0
        runtime: 0
        editor: 0
        export: 0
        polish: 0
      evidence: []
      blockers:
        - search/ route map not yet available
      next_required_move: "Define seo-rules.md output schema"

    - id: v2_analysis_engine
      name: SEO Analysis Engine
      status: planning
      priority: P1
      user_story: >
        As a developer, I need automated analysis of my routes for SEO
        optimization opportunities.
      saturation:
        foundation: 0
        runtime: 0
        editor: 0
        export: 0
        polish: 0
      evidence: []
      blockers:
        - SEO rules schema must be defined first
      next_required_move: "Design analysis pipeline architecture"

  subsystem_scorecards: []

  blocker_register:
    critical_blockers:
      - blocker_id: blk_seo_001
        description: "Search route map not yet available"
        impact: "Cannot analyze routes without route map from search/"
        owner: search
        unblock_strategy: "Wait for search/ route map capabilities"
        status: open

  execution_queue:
    qualifying_candidates:
      - id: eq_seo_001
        description: "Define seo-rules.md output schema"
        active_vertical: v1_seo_rules
        total_roi_score: 0
        qualifies: true
        blocked: true
        execution_rank: 1
        completion_status:
          value: pending

  source_control_policy:
    commit_after_each_completed_candidate: true
    push_after_each_successful_commit: true
    commit_message_policy:
      format: "[axis-seo] <vertical> - <summary>"
