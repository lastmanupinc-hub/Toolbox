memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  purpose: >
    Constitutional local memory for the Axis SEO subsystem.
    Supports fast reorientation, safe continuation, disciplined creativity,
    cross-folder coherence, and aggressive hygiene.

  use_contract:
    read_on_every_access: true
    audit_against_live_folder_on_every_access: true
    update_if_truth_changed: true
    run_exit_hygiene_after_each_completed_change: true
    forbid_skipping: true

  identity:
    folder_name: seo
    canonical_path: seo/
    system_role: >
      Discoverability engine. Analyzes codebase routes and generates SEO rules,
      schema recommendations, and route priority maps to improve discoverability
      from inside the codebase.
    global_dependency_reason: >
      Provides SEO intelligence that helps projects improve organic discoverability
      without leaving the development environment.
    in_scope:
      - route analysis
      - page audits
      - crawl runs
      - SEO rules generation (.ai/seo-rules.md)
      - schema recommendations (schema-recommendations.json)
      - route priority maps (route-priority-map.md)
      - API access for SEO
    out_of_scope:
      - repo indexing or search (belongs to search/)
      - debugging or root cause analysis (belongs to debug/)
      - governance file generation (belongs to skills/)
      - UI audit or component guidelines (belongs to frontend/)

  local_contract:
    must_preserve:
      - .ai/seo-rules.md output contract
      - schema-recommendations.json output contract
      - route-priority-map.md output contract
    may_change:
      - internal analysis algorithms
      - recommendation generation strategy
    must_not_change_without_cross_folder_update:
      - SEO rules schema if consumed by skills/ for governance
    forbidden_local_patterns:
      - duplicating context graph logic from search/
      - creating parallel snapshot ingestion
      - generating frontend guidelines (belongs to frontend/)

  connections:
    upstream_inputs_from:
      - search/ (route map, context map)
      - root snapshot_protocol
    downstream_outputs_to:
      - .ai/seo-rules.md
      - schema-recommendations.json
      - route-priority-map.md
      - content-audit.md
    directly_connected_subfolders:
      - search (consumes route map for SEO analysis)
      - frontend (may coordinate on route-level standards)
    external_interfaces:
      - POST /v1/seo/analyze
      - POST /v1/seo/audit

  human_surface:
    touches_user_experience: true
    primary_user_types:
      - developer
      - marketer
    user_visible_effects:
      - search engine discoverability
      - route optimization
      - structured data quality
    trust_sensitive: true

  canonical_truth:
    canonical_entrypoints: []
    critical_files: []
    golden_paths: []
    build_required_artifacts: []
    deploy_required_artifacts: []
    contract_artifacts:
      - .ai/seo-rules.md
      - schema-recommendations.json
      - route-priority-map.md
      - content-audit.md

  active_state:
    status: generators_complete
    currently_true:
      - subfolder created
      - MEMORY.yaml initialized
      - begin.yaml initialized
      - continuation.yaml initialized
    known_gaps:
      - no implementation code yet
      - no analysis engine
      - no SEO API
    active_blockers:
      - requires search/ route map to be available
    next_canonical_move: >
      Define seo-rules.md and schema-recommendations.json output schemas

  semantic_memory:
    stable_facts:
      - Axis SEO is a first-wave program
      - category is growth_and_content
      - promise is "Improve discoverability from inside the codebase"
      - acquisition_role is growth_entry_point
    boundary_facts:
      - meters are route_analyses, page_audits, crawl_runs
    contract_facts:
      - outputs are .ai/seo-rules.md, schema-recommendations.json, route-priority-map.md, content-audit.md
    naming_truth:
      - slug is "seo"
      - full name is "Axis SEO"
    schema_truth: []

  episodic_memory:
    keep_only_high_value_episodes: true
    episodes: []

  procedural_memory:
    required_sequences: []
    validation_order: []
    recurrent_failure_patterns: []
    safe_edit_patterns: []
    unsafe_edit_patterns: []

  prospective_memory:
    pending_obligations:
      - obligation: Define output schemas for seo-rules.md and schema-recommendations.json
        trigger_condition: when search/ route map is available
        due_when: before any SEO analysis functionality is built
        owner_scope: seo
        must_block_exit_if_unresolved: true
    expiry_checks: []

  creative_memory:
    latent_leverage_points:
      - leverage_point: SEO analysis can inform frontend/ route structure decisions
        why_it_exists_here: SEO depends on and influences route architecture
        what_it_could_unlock: route-aware UI standards that are SEO-optimized by default
        smallest_boundary_safe_probe: define SEO output schema with route-linkable fields
    adjacent_possible_moves: []
    semantic_tension_map: []

  provenance_memory:
    critical_claims: []
    contradiction_register: []

  cross_folder_sync:
    if_changed_update:
      - frontend/MEMORY.yaml (if SEO rules affect route standards)
    notify_contracts: []
    drift_risk_if_unsynced:
      - SEO depends on search/ route map staying stable

  hygiene:
    delete_on_exit:
      - temp
      - scratch
      - narrative
      - duplicate
      - recreatable
      - obsolete_evidence
    keep_on_exit:
      - runtime_required
      - build_required
      - deploy_required
      - canonical_contract
      - golden_path_required

  retention_review:
    required_after_each_completed_change: true

