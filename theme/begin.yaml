project_begin:
  version: v1
  role: session_gate_and_move_selector
  project_identity:
    name: "Axis Theme"
    category: "design_system"
    boundary: >
      Design system engine that produces design tokens, theme packs, and implementation
      rules from existing brand and UI signals. Does not perform repo indexing, debugging,
      governance generation, UI auditing, or SEO analysis.
    core_promise: "Generate project-consistent themes and token systems."
  required_read_order: [read_this_file_first, then_read_continuation_yaml, then_read_MEMORY_yaml, then_choose_next_valid_move]
  governing_root_files: [../axis_all_tools.yaml, ../begin.yaml, ../automated remedial action.yaml, ../hygiene and memory.yaml, ../memory generator.yaml]
  program_spec:
    slug: theme
    acquisition_role: visual_consistency
    description: Produce design tokens, theme packs, and implementation rules from existing brand and UI signals.
    free: [basic_palette_generation, preview_tokens]
    paid: [full_token_systems, export_theme_files, multiple_theme_variants, brand_sync, api_access]
    meters: [theme_generations, token_exports, variant_runs]
    outputs: [.ai/design-tokens.json, theme.css, theme-guidelines.md, component-theme-map.json]
    api_endpoints: [POST /v1/theme/generate, POST /v1/theme/export]
  operating_mode: {work_style: monolithic_vertical_saturation, canonical_policy: one_door_per_subsystem, evidence_policy: evidence_required_for_promotion}
  active_vertical_selection_policy:
    allowed_verticals: [design_token_schema, token_generation_engine, theme_api, variant_system]
  preferred_session_order: [read_continuation_yaml, read_MEMORY_yaml, determine_active_vertical, choose_highest_roi_move, implement_bounded_move, validate_and_capture_evidence, update_continuation_yaml, update_MEMORY_yaml]
