memory_yaml_standard:
  version: "2.0"
  file_name: "MEMORY.yaml"
  use_contract: {read_on_every_access: true, audit_against_live_folder_on_every_access: true, update_if_truth_changed: true, run_exit_hygiene_after_each_completed_change: true, forbid_skipping: true}
  identity:
    folder_name: theme
    canonical_path: theme/
    system_role: >
      Design system engine. Produces design tokens, theme packs, and implementation
      rules from existing brand and UI signals in the project.
    global_dependency_reason: "Provides the visual consistency layer consumed by frontend/, artifacts/, canvas/."
    in_scope: [design token generation, theme pack creation, theme variant management, brand sync, component theme mapping, API access]
    out_of_scope: [repo indexing (search/), debugging (debug/), governance (skills/), UI auditing (frontend/), SEO (seo/)]
  local_contract:
    must_preserve: [.ai/design-tokens.json output contract, theme.css output contract, theme-guidelines.md output contract, component-theme-map.json output contract]
    may_change: [internal token generation strategy, palette algorithms]
    must_not_change_without_cross_folder_update: [design-tokens.json schema consumed by frontend/ and artifacts/ and canvas/]
    forbidden_local_patterns: [duplicating brand voice rules from brand/, duplicating component standards from frontend/]
  connections:
    upstream_inputs_from: [search/ (repo context), brand/ (brand signals)]
    downstream_outputs_to: [.ai/design-tokens.json, theme.css, theme-guidelines.md, component-theme-map.json]
    directly_connected_subfolders: [frontend, artifacts, canvas, brand]
    external_interfaces: [POST /v1/theme/generate, POST /v1/theme/export]
  human_surface: {touches_user_experience: true, primary_user_types: [developer, designer], trust_sensitive: true}
  canonical_truth:
    contract_artifacts: [.ai/design-tokens.json, theme.css, theme-guidelines.md, component-theme-map.json]
  active_state:
    status: generators_complete
    currently_true: [subfolder created, MEMORY.yaml initialized]
    known_gaps: [no implementation code, no token generation engine]
    active_blockers: [requires search/ and brand/ context]
    next_canonical_move: "Define design-tokens.json schema"
  semantic_memory:
    stable_facts: [Axis Theme is a wave-2 program, category is design_system, promise is "Generate project-consistent themes and token systems", acquisition_role is visual_consistency]
    contract_facts: [outputs are .ai/design-tokens.json, theme.css, theme-guidelines.md, component-theme-map.json]
    naming_truth: [slug is "theme", full name is "Axis Theme"]
  cross_folder_sync:
    if_changed_update: [frontend/MEMORY.yaml, artifacts/MEMORY.yaml, canvas/MEMORY.yaml]
    drift_risk_if_unsynced: [all visual programs depend on theme/ tokens]
  hygiene: {delete_on_exit: [temp, scratch, narrative, duplicate], keep_on_exit: [runtime_required, build_required, canonical_contract]}
  retention_review: {required_after_each_completed_change: true}

